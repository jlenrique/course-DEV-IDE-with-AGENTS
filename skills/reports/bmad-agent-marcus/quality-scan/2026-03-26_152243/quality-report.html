y-system.md", "line": 22, "title": "Access boundary path validation — check file operations against allow/deny rules", "description": "Determinism confidence: certain. Estimated token savings: 300 per check, cumulative 1500+ per session. Implementation complexity: moderate. Language: python. Could be prepass: no. Reusable: yes. Marcus is instructed to verify every file operation path against read/write/deny zone rules before executing. The rules are static path-prefix matching (allow state/ writes in default, deny .env always, etc.). The LLM re-reads the boundary table and mentally pattern-matches each path every time — pure deterministic work. A 'check-access.py' script takes (path, operation, mode) and returns allowed/denied with the matching rule.", "action": "Create 'check-access.py' that encodes the allow/deny rules from access-boundaries.md and memory-system.md. Input: path, operation (read/write), mode (default/ad-hoc). Output: {allowed: bool, rule: string, zone: string}. Marcus calls before file ops.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "scripts-002", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "high", "rank": 1, "category": "lint-setup", "file": "scripts/generate-production-plan.py", "line": 0, "title": "uv not found on PATH — cannot run ruff for Python linting", "description": "", "action": "Install uv: https://docs.astral.sh/uv/getting-started/installation/", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-003", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "high", "rank": 1, "category": "lint-setup", "file": "scripts/read-mode-state.py", "line": 0, "title": "uv not found on PATH — cannot run ruff for Python linting", "description": "", "action": "Install uv: https://docs.astral.sh/uv/getting-started/installation/", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-006", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "references/conversation-mgmt.md", "line": null, "title": "CM capability is overloaded — four distinct concerns in one reference", "description": "The CM capability bundles conversation management, intent parsing, production planning, workflow orchestration, AND specialist handoff protocol into a single reference file. These are at least three distinct operational concerns: (1) understanding what the user wants, (2) planning how to produce it, (3) delegating to specialists. The reference is the longest and most complex, and a failure to load it would cripple most of Marcus's functionality. This creates a single point of failure and makes the capability table less useful as a routing mechanism.", "action": "Consider splitting CM into at least two capabilities: 'IP' (Intent Parsing & Conversation Management) and 'PP' (Production Planning & Specialist Orchestration). This would make the capability table more granular, improve selective loading, and reduce blast radius if one reference fails to load.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "misalignment", "file": "scripts/read-mode-state.py", "line": null, "title": "Mode state script doesn't actually track run mode (default vs ad-hoc)", "description": "read-mode-state.py returns a hardcoded 'mode': 'default' and never queries the database for actual mode state. The mode-management.md reference says to 'invoke ./scripts/read-mode-state.py to verify' after a mode switch, but the script cannot verify anything — it always returns 'default'. The actual mode appears to be tracked only in the memory sidecar's index.md, creating a disconnect between the documented verification mechanism and reality.", "action": "Either (a) add a mode column to the SQLite coordination.db and have the script read it, or (b) have the script read the mode from the memory sidecar index.md, or (c) update mode-management.md to clarify that mode is tracked in memory only and remove the script verification reference.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-008", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": null, "title": "No explicit production run closure or finalization lifecycle stage", "description": "The production workflow covers intake → plan → delegate → review → approve, but there's no explicit 'close run' or 'finalize and deliver' capability. What happens after the last checkpoint approval? How does a production run transition from 'approved' to 'delivered'? The generate-production-plan.py script shows stages ending at 'checkpoint' (human approval) for most content types, with 'publish' for some LMS content, but there's no orchestrator-level finalization step that archives the run, confirms delivery, and triggers chronology/pattern updates.", "action": "Add a lightweight 'RF' (Run Finalization) capability or extend CM to include an explicit close-out protocol: confirm all assets delivered, update chronology, trigger pattern extraction, archive run state, present summary to user.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-006", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "journey-friction", "file": "references/checkpoint-coord.md", "line": null, "title": "No streamlined path for expert users who trust the workflow", "description": "After 50 production runs, an expert user knows the drill: outline → slides → review → approve. But Marcus still presents the full production plan, inserts all checkpoint gates, and waits for explicit approval at every stage. There's no 'trust mode' or 'expedited review' for experienced users who want to say 'just build it with the usual settings and show me the final output.'", "action": "Add a 'confidence level' concept to production runs: for well-established workflows with high pattern confidence, Marcus can offer 'I'll run the standard workflow and come back with the finished product for your review. Just the final checkpoint. Sound good?' Collapse intermediate gates for trusted patterns while keeping the final review gate mandatory.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-007", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "references/conversation-mgmt.md", "line": null, "title": "No batch operations for multi-lesson production runs", "description": "Marcus processes production requests one at a time. An expert user who says 'build slides for all 6 lessons in Module 3' has no efficient path — Marcus would need to run 6 sequential production plans. For the automator archetype, this is the primary friction point: repetitive production across a module or course is common but unsupported at the orchestration level.", "action": "Add batch production planning: when a user requests content for multiple lessons, Marcus builds a consolidated plan showing all runs, shared parameters, and per-lesson customizations. Present as a single approval with per-item override capability. Track batch progress as a group with individual and aggregate status.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "references/conversation-mgmt.md", "line": null, "title": "No 'repeat last run' shortcut for similar production requests", "description": "After building lecture slides for M3L1, building the same for M3L2 should be trivial — same content type, same specialist sequence, same style parameters, different lesson. But there's no explicit 'repeat with different scope' pattern. The user goes through full intent parsing and production planning again.", "action": "Add template detection to production planning: when the current request closely matches a recent production run (same content type, same module, different lesson), Marcus offers 'This looks like the same setup as the M3L1 slides. Want me to use the same workflow and parameters, just for L2?' Pre-fill the production plan from the template.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-009", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "references/progress-reporting.md", "line": null, "title": "No session summary or portfolio view on exit", "description": "When a production session ends, there's no wrap-up. The user just stops talking. There's no 'here's everything we accomplished today,' no portfolio view of 'here's all content produced for Module 3,' and no course-level progress dashboard. The value Marcus delivers over time is invisible. This is classic success amnesia — the user forgets how much Marcus has done because there's no recap.", "action": "Add natural session wrap-up: when the user signals they're done (or at long idle), Marcus offers a session summary: 'Great session! We produced: slide deck for M3L1 (approved), voiceover script for M3L2 (in review). Module 3 is now 57% complete. Anything else before we wrap?' Also add a 'show me the portfolio' capability for on-demand course-level progress.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": null, "title": "Pattern learning is invisible to the user — missed delight opportunity", "description": "Marcus learns patterns in patterns.md (preferred voices, common revision patterns, specialist performance notes) but never shows the user what he's learned. The user doesn't experience 'oh, Marcus remembered that I always want more clinical images.' This is invisible value — the learning improves output quality but the user doesn't know why or how, and can't correct wrong patterns.", "action": "Periodically surface learned patterns: 'Based on our last 5 runs, I've noticed you prefer conversational tone for clinical cases and formal tone for assessments. I'll apply that going forward — let me know if it changes.' Also add a 'show me what you've learned' capability so the user can review and correct patterns.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "references/memory-system.md", "line": null, "title": "Memory system assumes single-course scope — no multi-course support", "description": "The memory sidecar (index.md, patterns.md, chronology.md) stores production context without explicit course scoping. A faculty member who teaches Pharmacology AND Clinical Skills AND Histology would have pattern confusion: the voice preference for Pharmacology lectures might differ from Clinical Skills case studies. The course_context.yaml appears to be singular. Memory entries don't tag which course they belong to.", "action": "Add course-level scoping to memory entries: patterns.md entries should include the course code. When Marcus loads patterns, filter by the active course context. Add multi-course support to index.md: track which course is 'active' and allow the user to switch course context explicitly.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "references/conversation-mgmt.md", "line": null, "title": "No partial restart — production plan is forward-only", "description": "The production plan sequences stages linearly with checkpoint gates. If the user approves stage 3 (slides) but then realizes the outline (stage 1) was wrong, there's no documented 'go back to stage 1' protocol. The production plan moves forward only. In practice, medical education content creation is highly iterative — professors frequently want to revisit earlier decisions after seeing downstream output.", "action": "Add stage rollback to production coordination: when the user wants to revise an earlier stage, Marcus acknowledges the downstream impact ('Going back to the outline will invalidate the slides we approved. I'll re-queue the slide generation after you approve the revised outline. Sound good?'), rolls back the plan state, and re-sequences.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Assumes style bible and exemplar library exist and are well-formed", "description": "Marcus's production planning, specialist handoffs, and quality gates all reference the style bible and exemplar library. Principle 10 says 'always consult' them. The activation sequence re-reads them fresh. But what if they're empty, incomplete, malformed, or contradictory? Init.md acknowledges they might not exist, but the downstream workflow doesn't degrade gracefully — the specialist context envelope includes 'relevant style bible sections' as a required field.", "action": "Define explicit 'no style bible' and 'no exemplar' degraded states: Marcus can still produce content but flags that brand consistency is at risk. Present degraded state clearly to user: 'No style bible found — I can still coordinate production, but visual consistency and brand standards won't be enforced. Want to create a style bible first, or proceed without?' Make style bible context optional in the specialist context envelope.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "references/conversation-mgmt.md", "line": null, "title": "Missing pedagogical intent elicitation before production", "description": "Source prompting asks 'do you have Notion notes?' and 'want me to check Box Drive?' — these are logistics questions. Missing is the deeper soft-gate question: 'What learning experience do you envision for students in this lesson? What should they be able to DO after this?' This pedagogical intent shapes every downstream decision (Bloom's level, assessment type, case complexity) but is never explicitly elicited. Marcus assumes it's embedded in the learning objectives, but objectives are often mechanical and don't capture the instructor's vision.", "action": "Add an 'intent elicitation' step before production planning: 'Before we build, tell me about the learning experience you're designing. What should students walk away able to do? Any specific clinical scenarios or concepts you want to anchor on?' Feed this into the content-creator context envelope alongside the formal learning objectives.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-015", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "references/checkpoint-coord.md", "line": null, "title": "Quality review uses single lens — no parallel review perspectives", "description": "The quality-reviewer specialist validates against the style bible as a single rubric. But medical education content has multiple quality dimensions that benefit from parallel evaluation: accessibility compliance, clinical accuracy, pedagogical alignment (Bloom's), assessment validity, and brand consistency. Running these as a single serial review risks the reviewer optimizing for one dimension while missing others.", "action": "Consider parallel review lenses within the quality-reviewer specialist: accessibility lens, clinical accuracy lens, pedagogical alignment lens, brand consistency lens. Present results as a multi-dimensional quality scorecard. This doesn't require multiple agents — it's a structured prompt pattern within the existing quality-reviewer.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-016", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "references/mode-management.md", "line": null, "title": "Missing 'planning mode' — third mode for semester-level content strategy", "description": "Marcus has default (production) and ad-hoc (experimental). Missing is a 'planning' mode where Marcus helps the user map out content strategy across an entire module or semester without producing anything. The user and Marcus would discuss: which lessons need which content types, what the production priority order is, where to reuse existing assets, what the timeline looks like. Currently this conversation would happen in default mode but wouldn't produce any artifacts or trigger any specialist agents.", "action": "Add a lightweight 'planning' mode or extend conversation management to recognize planning-intent conversations: 'Sounds like you want to plan the full module before we produce anything. Let me map out what's needed...' Output a content strategy document (markdown) that serves as the production roadmap.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-017", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "references/progress-reporting.md", "line": null, "title": "Proactive cross-reference detection between production runs", "description": "Marcus treats each production run independently. But medical education content is deeply interconnected: a pharmacology concept in Module 2 may be prerequisite to a clinical case in Module 4, an assessment question might reference a lecture slide, a patient scenario might appear in multiple modules with increasing complexity. Marcus could detect these connections and surface them proactively.", "action": "Add cross-reference awareness to production planning: when creating content for a lesson, scan existing content (via memory and staging) for related concepts. Surface connections: 'The medication interaction we covered in M2L3 is relevant here. Want me to reference it or build on it?' This leverages Marcus's unique position as the orchestrator who sees all content.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-018", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "references/conversation-mgmt.md", "line": null, "title": "Clarifying questions assume the user can answer them", "description": "When requests are ambiguous, Marcus asks clarifying questions: 'Did you mean Pharmacology or Clinical Skills?' But a new or confused user might not know how their course structure is represented in the system. They might not know module names, lesson identifiers, or even what content types they need. Marcus asks good questions but has no fallback for 'I don't know — show me what's available.'", "action": "Add 'discovery' fallbacks to clarifying questions: when the user can't answer, Marcus offers to show the options. 'Not sure? Let me pull up the course structure — here are the modules and lessons I know about. Which one are we working on?' Use course_context.yaml to present navigable options instead of requiring the user to know identifiers.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-019", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Context window exhaustion risk for long production sessions", "description": "A complex production run (interactive module with 5 stages, each involving multiple specialist interactions, review gates, and revisions) could generate enormous context. Marcus re-reads style bible, exemplars, memory sidecar, and state on every activation. Add specialist output, user feedback, revision history, and the context window fills fast. There's no explicit strategy for context management within a long session.", "action": "Add context window awareness: define a 'condensation protocol' for long sessions where Marcus summarizes completed stages into compact state records and releases the detailed context. The memory sidecar already has this concept (periodically condense patterns.md), but it needs to apply to in-session context as well.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-020", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "references/conversation-mgmt.md", "line": null, "title": "Shared/reused assets conflict with the asset-lesson pairing invariant", "description": "The asset-lesson pairing invariant says 'every educational artifact is paired with instructional context. No exceptions.' But medical education commonly reuses assets: a diagram of the cardiac conduction system might appear in Physiology, Pharmacology, and Clinical Skills modules. A case study might be the foundation for multiple lessons with different learning objectives. The invariant as stated doesn't account for one-to-many pairing.", "action": "Clarify the invariant to support one-to-many pairing: an asset must have AT LEAST ONE instructional context, and when reused in additional contexts, each usage must have its own documented pairing (learning objectives, assessment alignment for that context). Add a 'reuse' workflow to conversation management: 'This diagram is already paired with M1L3. Want to create a secondary pairing for this module with its own learning objectives?'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-000", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "resource-loading", "file": "SKILL.md", "line": 59, "title": "Eager full-directory loading of style-bible and exemplars on every activation", "description": "On Activation reads the entire resources/style-bible/ and resources/exemplars/ directories fresh on every activation, even when the user intent is a non-production task (status check, mode switch, memory save, simple conversation). These directories can grow large with brand assets, allocation matrices, and pattern files. The conversation-mgmt.md reference (line 68) already specifies passing 'relevant style bible sections (matched to specialist domain)' to specialists — showing that selective access is the intended usage pattern downstream. Loading everything eagerly at activation wastes tokens and latency for sessions that never touch production planning.", "action": "Defer style-bible and exemplar loading to the CM (Conversation Management) capability when production planning begins, or to the HC (Checkpoint Coordination) capability when quality criteria are needed. Add a note in On Activation: 'Style bible and exemplars are read fresh when production planning or quality review requires them — not on activation.' The index.md memory sidecar can note which style-bible sections were relevant in previous sessions for faster targeted loading.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-002", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "delegation-format", "file": "references/conversation-mgmt.md", "line": 72, "title": "Specialist return format specified as narrative prose instead of structured schema", "description": "The Specialist Handoff Protocol describes the expected inbound return from specialists as prose bullets: 'Artifact path, Quality self-assessment, Parameter decisions made, Completion status and any issues encountered.' For an orchestrator that processes many specialist returns to route workflows, a structured format specification (explicit keys, types, required vs optional) would reduce parsing ambiguity and enable consistent downstream processing. The outbound context envelope has the same issue but is less critical since specialists can tolerate flexible input.", "action": "Define an explicit structured return contract for specialists. Example: '**Inbound (from specialist):** Return a structured object with keys: `artifact_path` (string, required), `quality_assessment` (object: {passed: bool, notes: string[]}), `parameter_decisions` (object[], for pattern saving), `status` (enum: completed|blocked|failed), `issues` (string[]).'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-000", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "under-contextualization", "file": "SKILL.md", "line": 10, "title": "Overview slightly lean for orchestrator complexity", "description": "Overview is ~3 sentences plus a reference-library note and Args line (~7 content lines). For a complex persona-driven orchestrator managing two run modes, a memory sidecar system, multi-specialist delegation, style-bible/exemplar integration, and source-material prompting, the overview could benefit from 1-2 additional sentences explicitly surfacing the mode system and memory concepts that are central to Marcus's operational identity. Currently the LLM must read to On Activation (line 50) before encountering mode/memory, which delays scope comprehension.", "action": "Add 1-2 sentences to the overview mentioning the default/ad-hoc mode boundary and the sidecar memory system. Target ~10 overview sentences to match the agent's complexity tier.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "validation", "file": "references/memory-system.md", "line": 76, "title": "Mode-aware write permission lookup — table-driven file writability check", "description": "Determinism confidence: certain. Estimated token savings: 150 per check. Implementation complexity: trivial. Language: python. Could be prepass: no. Reusable: yes. The mode-aware write rules table (index.md: full/transient-only, patterns.md: append/readonly, etc.) is a pure lookup the LLM performs by re-reading the table each time. This is a subset of the access boundary validation and should be folded into the same script.", "action": "Fold into 'check-access.py' — the sidecar file write rules become additional entries in the permission table. Same interface: (file, operation, mode) → allowed/denied.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "extraction", "file": "SKILL.md", "line": 52, "title": "Config variable resolution — parse YAML configs and extract user/language settings", "description": "Determinism confidence: certain. Estimated token savings: 350. Implementation complexity: trivial. Language: python. Could be prepass: yes. Reusable: yes. Marcus reads config.yaml and config.user.yaml, extracts three variables (user_name, communication_language, document_output_language), and applies defaults. This is pure YAML key extraction. The LLM reads the full YAML, finds three keys, applies defaults — all deterministic. Note: this could be a subcommand of the preflight-activation script.", "action": "Include as part of 'preflight-activation.py' config section. If standalone, a 5-line script: load YAML, get keys with defaults, print JSON.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-006", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "references/conversation-mgmt.md", "line": 39, "title": "Course hierarchy resolver — extract module/lesson/objective tree from YAML", "description": "Determinism confidence: certain. Estimated token savings: 400. Implementation complexity: trivial. Language: python. Could be prepass: yes. Reusable: yes. When the user says 'build slides for cardiac assessment,' Marcus reads course_context.yaml and resolves the course→module→lesson→objectives path. The generate-production-plan.py script already loads course context but only uses it during plan generation. A standalone resolver (or flag on the existing script) could return the full hierarchy or resolve a fuzzy module/lesson reference to its exact ID and objectives, saving the LLM from parsing the full YAML.", "action": "Add '--resolve MODULE [LESSON]' mode to generate-production-plan.py (or create 'resolve-course-context.py') that returns structured JSON: module title, lesson title, learning objectives, asset inventory for that scope.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-007", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "validation", "file": "references/conversation-mgmt.md", "line": 78, "title": "Asset-lesson pairing validator — verify every artifact has instructional context", "description": "Determinism confidence: high. Estimated token savings: 400. Implementation complexity: moderate. Language: python. Could be prepass: no. Reusable: yes. Before marking any production step complete, Marcus verifies: asset has parent lesson in course hierarchy, learning objectives documented, assessment alignment explicit. The hierarchy check is deterministic (traverse course_context.yaml). Objective documentation check is deterministic (file exists, section present). Only the assessment alignment judgment is partially interpretive. A script can handle the structural checks and flag missing elements for LLM review.", "action": "Create 'validate-asset-pairing.py' that takes asset path and lesson ID, checks: (1) lesson exists in course_context.yaml, (2) lesson has learning_objectives list, (3) assessment alignment section exists in asset file. Returns {valid: bool, missing: [...]}.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-008", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "references/conversation-mgmt.md", "line": 61, "title": "Context envelope assembler — pre-populate specialist handoff data from state and config", "description": "Determinism confidence: high. Estimated token savings: 400. Implementation complexity: moderate. Language: python. Could be prepass: yes. Reusable: yes. When delegating to specialists, Marcus constructs a context envelope with: run ID (from SQLite), content type, scope (from course YAML), learning objectives (from course YAML), style bible sections (file matching), exemplar references (file matching). Most fields are deterministic lookups. A script could pre-assemble the envelope JSON from state DB + course context + file inventory, leaving only user constraints and revision feedback for the LLM to add.", "action": "Create 'assemble-context-envelope.py' taking run_id, content_type, module_id, lesson_id. Pulls: run state from SQLite, objectives from course YAML, lists matching style-bible files, lists matching exemplar files. Returns partial envelope JSON. LLM fills in user constraints and qualitative fields.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "scripts-000", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "medium", "rank": 2, "category": "agentic-design", "file": "scripts/generate-production-plan.py", "line": 1, "title": "No json.dumps found — output may not be structured JSON", "description": "", "action": "Use json.dumps for structured output parseable by workflows", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-001", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "medium", "rank": 2, "category": "agentic-design", "file": "scripts/read-mode-state.py", "line": 1, "title": "No json.dumps found — output may not be structured JSON", "description": "", "action": "Use json.dumps for structured output parseable by workflows", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "consistency", "file": "SKILL.md", "line": 50, "title": "Access boundaries not explicitly loaded in On Activation sequence", "description": "memory-system.md declares access-boundaries.md with 'Load on activation' and states 'On every activation, load these boundaries first. Before any file operation, verify the path is within allowed boundaries.' However, the On Activation sequence in SKILL.md (lines 52-66) loads config → memory index → state → greet without explicitly mentioning access-boundaries.md. This creates a gap: if index.md doesn't explicitly point to access-boundaries.md, the boundaries may not be loaded, especially on first run where init.md creates the file but the activation flow branches to init.md instead of the normal memory load path.", "action": "Add an explicit step in On Activation to load access-boundaries.md from the memory sidecar (or from memory-system.md inline definition) before any state reads or file operations. Place it immediately after loading index.md.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-001", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "capability-completeness", "file": "SKILL.md", "line": 81, "title": "External Skills reference 5 unvalidated target skills", "description": "The External Skills table references pre-flight-check, production-coordination, run-reporting, parameter-intelligence, and source-wrangling. These are core to Marcus's production workflow (connectivity checks, state management, reporting, style elicitation, source material retrieval). If these skills do not exist, Marcus cannot execute multi-agent production workflows as designed. No validation that these targets are built or stubbed.", "action": "Build or stub these 5 skills, or add explicit 'Status: planned' annotations to the External Skills table so Marcus can gracefully degrade when they are unavailable.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-002", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "capability-completeness", "file": "SKILL.md", "line": 91, "title": "External Specialist Agents reference 6 active + 2 future unvalidated agents", "description": "The External Specialist Agents table references gamma-specialist, elevenlabs-specialist, canvas-specialist, content-creator, quality-reviewer, and assembly-coordinator as active dependencies, plus qualtrics-specialist and canva-specialist as future. These specialists are the execution layer for all content production. Two are marked 'Future:' which is good practice, but the 6 active agents are listed without availability status.", "action": "Validate that the 6 active specialist agents exist and are callable. Add a 'Status' column to the table (active/planned/future) so Marcus can route around unavailable specialists during production planning.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "references/conversation-mgmt.md", "line": null, "title": "No curriculum-level or batch production planning", "description": "Marcus can plan production for individual content items (one slide deck, one case study, one assessment), but there's no capability for planning at the module or semester level. A faculty user preparing an entire module might need to say 'Build all lesson content for Module 3' and get a coordinated multi-item production plan with dependency ordering across lessons. The current content-type-to-workflow mapping is purely per-item.", "action": "Consider adding a 'curriculum planning' mode or extending production planning to handle multi-item requests with inter-item dependency awareness (e.g., lecture slides should be approved before the assessment that tests the same objectives).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-010", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No content search or reuse capability", "description": "When producing new content, there's no explicit capability for searching previously produced assets for reuse or adaptation. A faculty user building a new case study might want to reference or adapt a similar case from a prior module. The memory sidecar tracks production history (chronology.md) but there's no search or retrieval interface for past artifacts beyond what the user remembers.", "action": "Consider adding a content discovery capability that can search course-content/ for existing assets by content type, module, topic, or learning objective, and present reuse opportunities before starting from scratch.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "references/checkpoint-coord.md", "line": null, "title": "No revision workflow for previously-approved content", "description": "Checkpoint coordination handles the approve/revise/reject cycle during initial production, but there's no documented workflow for revising content that was previously approved and delivered. What if a faculty user needs to update slides from last semester based on new clinical guidelines? The current model assumes production runs produce new content, not revise existing approved artifacts.", "action": "Document a revision workflow: how to initiate a revision of existing approved content, how to version it, and how revision context (original approval, change rationale) is passed to specialists.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-021", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "scripts/read-mode-state.py", "line": null, "title": "read-mode-state.py doesn't actually read or set the run mode", "description": "The script reads production run state from SQLite but returns mode as hardcoded 'default'. There's no mode field in the database query, no mode state file, and no mechanism to actually store or retrieve the current run mode. Mode management in the reference doc describes mode switching but the infrastructure to persist mode state doesn't exist in the script.", "action": "Add a mode column to the production_runs table or a separate mode_state table/file. The read-mode-state.py script should return the actual persisted mode, not a hardcoded default. This is likely a v2 infrastructure concern, but the gap between the mode management reference doc and the actual script capability should be documented.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-022", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "SKILL.md", "line": null, "title": "No 'what can you do?' onboarding capability", "description": "Marcus has 6 internal capabilities, 5 external skills, and 8 specialist agents. But there's no guided capability tour for a new user. The first-timer archetype asks 'what can you help me with?' and Marcus would need to improvise an answer from the capability tables. A structured onboarding tour would accelerate adoption.", "action": "Add a natural 'what I can do' response pattern: when a user asks about capabilities, Marcus presents them as production scenarios rather than capability tables. 'I can help you build slide decks, write case studies, create assessments, produce voiceovers, assemble interactive modules — basically anything your course needs. I'll handle the coordination with specialist tools. What are you working on?'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-023", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "assumption-risk", "file": "references/source-prompting.md", "line": null, "title": "Assumes Notion and Box Drive content is well-organized and retrievable", "description": "Source prompting offers to 'pull Notion notes' and 'check Box Drive' but assumes these sources are organized in a way that Marcus can navigate. In practice, faculty Notion pages are often chaotic (nested pages, no tagging, mixed personal and course content) and Box Drive folders may have inconsistent naming. The source-wrangling skill would need robust search, not just path-based retrieval.", "action": "Add a 'source quality assessment' to the source-wrangling interaction: when pulled content is sparse, disorganized, or unclear, Marcus reports this to the user. 'I pulled the Notion notes for Module 3 but they're fairly sparse — just bullet points. Want to give me more context verbally, or should we work from what's there?'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-024", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "references/progress-reporting.md", "line": null, "title": "No celebration or reinforcement when milestones are reached", "description": "When a module is complete, when the first production run finishes, when the 10th assessment is approved — Marcus reports it as routine status. There's no milestone recognition. Faculty producing course content are doing creative work under time pressure; acknowledging accomplishments is a small delight that builds engagement.", "action": "Add milestone awareness to progress reporting: 'That's Module 2 complete — all 5 lessons have slide decks, assessments, and voiceovers. That's a big milestone. Ready to start Module 3, or want to take a look at the full Module 2 portfolio first?' Natural, not artificial — proportional to actual accomplishment.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-025", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "experience-gap", "file": "SKILL.md", "line": null, "title": "Cross-specialist coordination value is invisible to the user", "description": "Marcus builds context envelopes (production run ID, content type, learning objectives, style bible sections, exemplar references, user constraints, revision feedback) and passes them to every specialist. This is Marcus's core value add — ensuring specialist output is contextually grounded. But the user never sees this happening. They don't know Marcus is telling Gamma about the style bible or passing revision feedback to the content-creator.", "action": "Occasionally make coordination visible: 'I'm passing the learning objectives and your feedback about clinical images to Gamma for the slide redesign — they'll have full context.' Not every time (that's noise), but periodically to reinforce Marcus's coordination value.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-026", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "references/mode-management.md", "line": null, "title": "Mode names are system-centric, not user-centric", "description": "'Default mode' and 'ad-hoc mode' are implementation-level names. A medical education faculty member thinks in terms of 'working on my course' vs 'trying something out.' The mode names don't map to the user's mental model. 'Default' especially is meaningless — it's just the mode that isn't the other one.", "action": "Consider user-facing mode names: 'Production mode' (everything is tracked and saved) vs 'Sandbox mode' (experiment freely, nothing is permanent). Marcus can use these labels in conversation while keeping the technical names internally. 'Want to try this in sandbox mode first, or go straight to production?'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-027", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "facilitative-pattern", "file": "references/checkpoint-coord.md", "line": null, "title": "No dual-output option at review gates", "description": "At checkpoint gates, Marcus presents the artifact for user review. But the user might want to share the artifact with a teaching assistant, a co-instructor, or an accreditation reviewer. There's no 'generate a shareable summary' output alongside the review presentation — the user would need to copy-paste or re-describe the artifact to share it.", "action": "Add optional dual-output at review gates: 'Want me to generate a quick summary of this slide deck you can share with your team for feedback?' Produce a condensed description (content, objectives covered, quality assessment) in a shareable format alongside the full review presentation.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-028", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "No handling for mid-production user absence (days/weeks gap)", "description": "Marcus's memory system captures state, and the activation sequence loads last session context. But there's no explicit handling for staleness. If a user starts a production run, disappears for 3 weeks, and returns — are the pending review gates still valid? Is the specialist output still current? Have the learning objectives changed? Marcus resumes as if nothing happened.", "action": "Add staleness detection to activation: if the last session activity was more than N days ago, Marcus proactively checks for changes. 'Welcome back! It's been a few weeks since we last worked on M3L2. The style bible has been updated since then — want me to check if the pending slides still comply, or start fresh?'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-029", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "references/memory-system.md", "line": null, "title": "No 'expertise evolution' visibility — Marcus gets smarter but user doesn't see it", "description": "patterns.md accumulates workflow sequences, parameter preferences, revision patterns, and specialist performance notes. Over time, Marcus becomes significantly more attuned to the user's preferences. But this evolution is invisible. After 20 sessions, Marcus doesn't say 'I've learned a lot about how you like content produced. Here's a summary of your style profile.'", "action": "Add periodic 'what I've learned' summaries: at natural milestones (every N production runs, start of new module), Marcus offers a brief pattern review. 'Over our last 10 runs, I've learned: you prefer Rachel for narration, you usually reduce slide count by 2-3 on first review, and you like clinical images over diagrams. Does this still hold?' This also serves as a correction opportunity.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-001", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "parallelization", "file": "SKILL.md", "line": 52, "title": "Sequential activation reads where four independent operations could be batched", "description": "The On Activation sequence lists these as implicitly sequential prose steps: (1) load config.yaml + config.user.yaml, (2) load sidecar memory index.md, (3) load memory-system.md reference, (4) run read-mode-state.py or read state files. Steps 1, 3, and 4 are fully independent of each other and of step 2 (though step 2 has a conditional branch to init.md if the sidecar doesn't exist). Four independent reads listed sequentially is a minor latency opportunity.", "action": "Restructure On Activation into two groups: a parallel batch (config files, memory-system.md reference, mode state script) and a sequential follow-up (sidecar index.md → conditional init.md). This can be expressed as: 'In parallel: load config files, load memory-system.md reference, invoke read-mode-state.py. Then: load sidecar index.md (or init.md if first run).'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-003", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "resource-loading", "file": "references/checkpoint-coord.md", "line": 26, "title": "Quality criteria re-reads entire style-bible per review gate without section targeting", "description": "Checkpoint coordination states quality criteria sources are 'both re-read fresh for each review gate' referring to the full resources/style-bible/ directory. If the eager activation loading (finding 1) is resolved by deferring to capability-time loading, each review gate would still load the entire style bible rather than the sections relevant to the artifact under review (e.g., only typography standards for slide review, only voice/tone for narration review).", "action": "When loading style-bible for a review gate, scope reads to sections relevant to the artifact type and specialist domain. The outbound context envelope already identifies 'relevant style bible sections (matched to specialist domain)' — apply the same selectivity when Marcus loads quality criteria for checkpoint evaluation.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-001", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "token-waste", "file": "SKILL.md", "line": 12, "title": "Style-bible/exemplar re-read-from-disk instruction repeated 5 times", "description": "The 'always re-read from disk, never cache' instruction appears in: SKILL.md overview (line 12-13), Principle 10 (line 44), Does Not Do (line 48), memory-system.md core principle (line 7), and checkpoint-coord.md (line 26). Five occurrences across the agent surface. While self-containment justifies repetition in separately-loaded references (memory-system.md, checkpoint-coord.md), the three occurrences within SKILL.md itself (overview, principles, does-not-do) are redundant since they always load together.", "action": "Consolidate to one strong statement in Overview or Principles within SKILL.md. Keep the repetition in memory-system.md and checkpoint-coord.md for self-containment.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "structural-inconsistency", "file": "references/save-memory.md", "line": 1, "title": "YAML frontmatter present only in save-memory.md", "description": "save-memory.md has YAML frontmatter (name, description, menu-code) while all other reference files use plain markdown with a Purpose section. This inconsistency suggests save-memory.md may have been templated from a different source or intended as a standalone skill rather than a reference file. Functionally harmless but creates a structural inconsistency across the references/ directory.", "action": "Either add consistent frontmatter to all reference files (if tooling benefits from it) or remove frontmatter from save-memory.md and rely on the Capabilities table in SKILL.md for the menu-code mapping.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-003", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "brittleness", "file": "references/conversation-mgmt.md", "line": 39, "title": "Hardcoded path for course context YAML", "description": "Line 39 references `state/config/course_context.yaml` as a literal path. The generate-production-plan.py script resolves this path dynamically relative to project root, but the prompt text embeds it as a fixed string. If the project structure changes, the prompt text drifts from the script's resolution logic.", "action": "Reference the path using a config variable or note that the script handles resolution. Minor concern since the path is also embedded in the script as a default.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "progressive-disclosure", "file": "references/memory-system.md", "line": 22, "title": "Access boundaries embedded in memory-system.md rather than standalone", "description": "The access-boundaries section (lines 22-57) is a critical security construct — deny zones, mode-aware write permissions, boundary verification on every file operation. It's embedded as a subsection of memory-system.md rather than being a standalone reference. Given that access-boundaries.md is also a sidecar file that gets created at init, having the specification embedded in memory-system.md creates a layering question: is memory-system.md the source of truth, or is the generated access-boundaries.md?", "action": "Consider extracting access boundaries into a standalone reference (access-boundaries-spec.md) that serves as the canonical specification. Low priority since current structure is functional.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-009", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "postprocessing", "file": "references/checkpoint-coord.md", "line": 33, "title": "Checkpoint outcome record validator — ensure structured fields are present in state writes", "description": "Determinism confidence: certain. Estimated token savings: 200. Implementation complexity: trivial. Language: python. Could be prepass: no. Reusable: yes. After checkpoint decisions, Marcus records structured data: artifact ID, version, decision, revision count, feedback, time-to-approval. The record structure is fixed. A post-processing script could validate that the state write contains all required fields with correct types before committing, catching LLM omissions.", "action": "Create 'validate-checkpoint-record.py' that takes a checkpoint record JSON and validates: all required fields present, decision in {approved, revision, rejected}, revision_count is integer, timestamps parseable. Returns {valid: bool, errors: [...]}.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-010", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "transformation", "file": "references/mode-management.md", "line": 28, "title": "Mode switch state updater — write new mode to state with enforcement validation", "description": "Determinism confidence: certain. Estimated token savings: 150. Implementation complexity: trivial. Language: python. Could be prepass: no. Reusable: no. On mode switch, Marcus updates mode in state and adjusts routing. read-mode-state.py handles the read side. A complementary 'set-mode-state.py' could handle the write: update SQLite mode field, validate the switch is valid, clear ad-hoc session section in index.md when switching back to default. Currently the LLM manually performs these state mutations.", "action": "Create 'set-mode-state.py' taking target mode (default/ad-hoc). Updates SQLite, clears ad-hoc section in index.md if switching to default, returns confirmation JSON. Pairs with read-mode-state.py.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-003", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "identity", "file": "SKILL.md", "line": 16, "title": "Identity section mixes persona definition with domain knowledge enumeration", "description": "The identity opens with a strong one-sentence persona ('Veteran executive producer...calm, experienced, unflappable') but then extends into a domain knowledge inventory (Bloom's taxonomy, LCME, ACGME, etc.) and a role relationship statement. While all content is high quality and relevant, the blending makes the persona less immediately graspable. The domain knowledge list reads more like a 'Domain Expertise' subsection.", "action": "Consider separating into a focused one-sentence persona followed by a 'Domain Expertise' subsection. Low priority — current form is functional and effective.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-004", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "structure", "file": "SKILL.md", "line": 0, "title": "No bmad-skill-manifest.yaml present", "description": "Other BMAD agents in the workspace (analyst, architect, dev, pm, qa, quick-flow-solo-dev, sm, tech-writer, ux-designer) include a bmad-skill-manifest.yaml for metadata and discoverability. bmad-agent-marcus does not have one. This may be intentional (newer agent, different pattern) but creates inconsistency with the agent cohort.", "action": "Add a bmad-skill-manifest.yaml if it is part of the standard BMAD agent structure. If intentionally omitted, document why in the agent README or SKILL.md.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-005", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "principles", "file": "SKILL.md", "line": 33, "title": "High principle count (10) may increase token pressure in long sessions", "description": "All 10 principles are domain-specific and high quality — none are generic filler. However, principles 3 (quality gates non-negotiable), 4 (asset-lesson pairing inviolable), and 5 (medical education rigor) all address quality/rigor from different angles and could potentially be consolidated. Similarly, principles 9 (source material assistance) and 10 (ground in style bible/exemplars) both address reference consultation. At 10 principles, the section consumes meaningful token budget on every activation.", "action": "Consider consolidating to 7-8 principles by merging related quality/rigor principles and reference consultation principles. Low priority — current principles are all actionable and domain-specific.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-012", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Separate future specialist agents from current ones in the table", "description": "The External Specialist Agents table mixes currently available agents (gamma-specialist, elevenlabs-specialist, etc.) with future/planned ones (qualtrics-specialist, canva-specialist) using inline 'Future:' labels. This could confuse the LLM during activation — it might attempt to delegate to a specialist that doesn't exist yet and then need to recover from the error.", "action": "Split the table into 'Available Specialist Agents' and 'Planned Specialist Agents' (or 'Future'), or add an explicit 'Status' column (active/planned) to the table so the agent can filter at delegation time.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-013", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "references/source-prompting.md", "line": null, "title": "Source prompting could integrate with content-creator for automatic context enrichment", "description": "Currently, source prompting (SP) offers to pull materials before production, and the retrieved materials are manually incorporated into the context envelope. This could be tighter — when content-creator is invoked, Marcus could automatically attach any previously-pulled source materials for the target lesson without requiring the user to confirm each time. The current flow adds conversational overhead on every production task.", "action": "Consider a 'smart source attachment' behavior: if Notion notes or Box Drive materials were already pulled for a lesson during a prior session (tracked in patterns.md or chronology.md), automatically include them in the specialist context envelope with a brief mention to the user, rather than re-prompting.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-014", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "No multi-user collaboration or handoff capability", "description": "Marcus assumes a single user (the creative director/domain expert). In real medical education departments, multiple faculty may collaborate on a course. There's no concept of delegating review checkpoints to a different faculty member, sharing production state across users, or managing concurrent production runs from different requestors. This is reasonable for v1 but worth noting for roadmap.", "action": "For a future version, consider a lightweight collaboration model: named reviewers at checkpoint gates, production run ownership, and the ability to share run status with other faculty.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "positive-craft", "file": "SKILL.md", "line": 16, "title": "Exemplary intelligence placement between scripts and prompts", "description": "Deterministic operations (production plan generation from content type templates, state reading from SQLite) are correctly placed in scripts. Judgment operations (intent parsing, quality gate decisions, specialist routing, user interaction, clarification questions) remain in prompts. This is textbook correct placement for a workflow-facilitator agent.", "action": "No action needed. Maintain this pattern when adding new capabilities.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-006", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "positive-craft", "file": "SKILL.md", "line": 20, "title": "Communication Style section is high-quality persona craft", "description": "Eight detailed bullet points with concrete example utterances that precisely calibrate Marcus's voice: lead-with-context, options-with-recommendations, natural progress reporting, appropriate urgency, no unnecessary technical detail, domain-native vocabulary, unambiguous mode confirmations, cite style bible. Each bullet includes a worked example. This is load-bearing persona voice that directly instructs the LLM on output style and is NOT token waste.", "action": "No action needed. This section is a strong example of persona craft done right.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-007", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "positive-craft", "file": "references/", "line": 0, "title": "Strong self-containment across all reference files", "description": "All 8 reference files have their own Purpose section, sufficient domain context, and can function independently if SKILL.md drops from context. conversation-mgmt.md includes the full Content Type Vocabulary table and handoff protocol. checkpoint-coord.md includes a worked example with medical education domain grounding. source-prompting.md has domain-specific examples. No reference file requires SKILL.md presence to make sense.", "action": "No action needed. This is the correct pattern for progressive disclosure.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Exemplary persona-capability alignment", "description": "Marcus's identity as a veteran executive producer maps precisely to what he does: orchestrate, delegate, manage checkpoints, report progress, and enforce quality. The persona doesn't promise abilities the capability set can't deliver, and the capability set doesn't include anything incongruent with the persona. The 'Does Not Do' section reinforces this by explicitly excluding code, tests, git, and API work — drawing a clean boundary around the orchestrator role.", "action": "No action needed. This is a model of how persona and capability should align.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Deep medical education domain embedding", "description": "Marcus doesn't just coordinate generic content — he speaks the language of medical education: Bloom's taxonomy, backward design, clinical case integration, assessment-objective tracing, LCME/ACGME accreditation awareness. This domain knowledge is woven into Identity, Communication Style, Principles, and the checkpoint quality criteria. A faculty user would immediately feel that Marcus understands their world.", "action": "No action needed. Domain embedding is thorough and natural.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-002", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Context envelope pattern for specialist delegation", "description": "The specialist handoff protocol defines a consistent context envelope (outbound: run ID, content type, scope, learning objectives, constraints, style bible sections, exemplar refs; inbound: artifact path, quality self-assessment, parameter decisions, status). This provides a clean, repeatable interface contract for all specialist agents, making the delegation pattern scalable and predictable.", "action": "No action needed. Well-designed integration pattern.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-003", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/mode-management.md", "line": null, "title": "Mode management with hard enforcement boundaries", "description": "The default/ad-hoc mode system is well-conceived. It gives faculty a safe experimentation sandbox (ad-hoc) without polluting production state, while maintaining QA in both modes. The enforcement rules are explicit: no state writes in ad-hoc, no production routing, no pattern learning. The mode switch confirmations are unambiguous. This solves a real workflow need — faculty often want to try something before committing.", "action": "No action needed. Strong operational design.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-004", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/memory-system.md", "line": null, "title": "Sophisticated memory system with mode-aware write discipline", "description": "The memory sidecar architecture (index.md as entry point, access-boundaries.md for permissions, patterns.md for learned behavior, chronology.md for history) is well-structured. Mode-aware write rules prevent ad-hoc experimentation from corrupting learned patterns. The write-through vs. checkpoint persistence strategy is practical. The principle that style bible content is never cached in memory (always re-read from disk) prevents stale reference drift.", "action": "No action needed. Memory architecture is production-grade.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-005", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Asset-lesson pairing invariant is a strong quality guardrail", "description": "The non-negotiable rule that every educational artifact must be paired with instructional context (parent lesson, traceable learning objectives, assessment alignment) prevents the common anti-pattern of orphaned assets. This invariant is enforced in conversation-mgmt.md and echoed in production planning. It reflects real medical education accreditation requirements where traceability is essential.", "action": "No action needed. Domain-appropriate quality enforcement.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}], "journeys": [], "assessments": {"cohesion_analysis": {"persona_alignment": {"score": "strong", "notes": "Marcus's identity as a veteran executive producer aligns precisely with the capability set. Every internal capability (conversation management, progress reporting, checkpoint coordination, mode management, source prompting, memory) maps to what an orchestrator should do. The 'Does Not Do' section reinforces the boundary — no code, no tests, no APIs. The medical education domain knowledge is embedded throughout, not bolted on. The communication style guidance reinforces the persona naturally."}, "capability_completeness": {"score": "mostly-complete", "missing_areas": ["Production run closure/finalization lifecycle stage", "Curriculum-level or batch production planning", "Content search and reuse across past productions", "Revision workflow for previously-approved content"], "notes": "The core production workflow (intake → plan → delegate → review → approve) is well-covered. The main gap is at the lifecycle boundaries: how a run formally closes, and how past production feeds into future production. These are not blocking for v1 usage but would surface quickly in sustained use across a full semester of course production."}, "redundancy_level": {"score": "clean", "consolidation_opportunities": ["CM could be split rather than consolidated — it bundles four concerns (conversation mgmt, intent parsing, production planning, specialist orchestration) that might benefit from being two capabilities"]}, "external_integration": {"external_skills_referenced": 13, "integration_pattern": "intentional", "notes": "The separation between external skills (workflow tools: pre-flight-check, production-coordination, run-reporting, parameter-intelligence, source-wrangling) and external specialist agents (content producers: gamma, elevenlabs, canvas, content-creator, quality-reviewer, assembly-coordinator, plus 2 future) is deliberate and well-structured. The context envelope pattern provides a clean, consistent interface contract for all delegations. Two future specialists are noted but could be separated more clearly to avoid premature delegation attempts."}, "user_journey_score": {"score": "mostly-complete", "broken_workflows": ["No explicit path from 'all checkpoints approved' to 'production run finalized and delivered'", "No path for revising previously-approved content from prior semesters", "No way to search for or reuse past production artifacts"], "notes": "A medical education faculty member can accomplish meaningful content production end-to-end for the first-time-through case. The first-run onboarding is smooth, intent parsing is comprehensive, production planning with checkpoint gates covers the creative workflow well, and mode management provides safe experimentation. The gaps appear at the lifecycle edges: finalizing completed runs, revising old content, and leveraging past production for efficiency gains. These don't create dead-ends but rather soft edges where the user would need to work around limitations."}}, "agent_identity": {"name": "bmad-agent-marcus", "persona_summary": "Veteran executive producer for health sciences and

- id: seg-07
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-07
  narration_text: '**Design thinking** can sound like business jargon — until you
    map it to your clinical method. When you take a history, you’re **building empathy
    with reality** — what’s actually happening to this person. When you synthesize
    exam and data into a working diagnosis, you’re **defining the problem** with rigor.
    When you build a differential and choose a plan, you’re **ideating** and **testing**
    a hypothesis — then iterating when the story changes. You already run an innovation
    loop; the “patient” is often a human being. In this program, we’ll also aim that
    loop at **broken workflows** — where harm is statistical, not singular.'
  behavioral_intent: analytical
  voice_id: null

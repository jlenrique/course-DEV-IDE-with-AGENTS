name: PDG-3 Flake Gate

# Binding per Story 27-2.5 §Pre-Development Gate PDG-3 and extended to PR-R per
# Murat's Sprint #1 roster rider #6.
#
# Runs the cross-validation + retrieval-dispatcher test slice 3x in sequence
# and fails if any run diverges from the others, OR if any run is not green.
#
# Runs on push to any branch AND on PRs that touch files likely to affect the
# slice; this is a gate (not ambient), so jobs report actual pass/fail.

on:
  push:
    branches:
      - '**'
  pull_request:
    paths:
      - 'skills/bmad-agent-texas/scripts/retrieval/**'
      - 'tests/test_retrieval_*.py'
      - 'tests/contracts/test_retrieval_*.py'
      - 'tests/fixtures/retrieval/**'
      - 'scripts/ci/run_flake_gate.py'
      - '.github/workflows/pdg-flake-gate.yml'

jobs:
  flake-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if test -f requirements.txt; then pip install -r requirements.txt; fi
          if test -f requirements-dev.txt; then pip install -r requirements-dev.txt; fi

      - name: Run PDG-3 flake gate (3x)
        run: python scripts/ci/run_flake_gate.py

    narration_text: >
      Watch the physician on screen. That pause — the weight behind the eyes, the handheld
      device, the corridor pressing in around them — is not a personal failure. It is not a
      verdict on your capacity — it is a systems signal. The National Academy of Medicine has
      named this inflection point. Across medicine, across courses and careers, burnout is not
      the end of the starting line. It is the beginning of it. You are not just an employee
      within a healthcare system. You are a designer of it. The solution to that moment — to
      the complexity, the overwhelm, the gap between clinical training and systemic dysfunction
      — lies dormant in its most valuable asset. In you. This is not a dead end. This is where
      we begin.
    behavioral_intent: >
      Establish the core identity reframe — from clinician-as-reactor to
      clinician-as-designer — using the emotional register of the motion clip to ground
      the opening conviction.
    master_behavioral_intent: >

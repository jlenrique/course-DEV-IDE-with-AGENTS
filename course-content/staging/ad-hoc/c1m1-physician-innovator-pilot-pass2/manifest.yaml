- id: seg-03
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-03
  narration_text: 'In this program, an **innovation mindset** means this: you hold
    the internal conviction that you can be a **designer of the healthcare system**
    — not only an employee within it. You’re still bound by evidence, ethics, and
    scope of practice. You’re *expanding* where your agency applies: to workflows,
    handoffs, and system patterns that either help or harm. The National Academy of
    Medicine and related work on clinician well-being remind us: burnout isn’t only
    personal resilience — it’s often **system design**. That’s the arena we’re entering.'
  behavioral_intent: definitional
  voice_id: null
  visual_cue: Static slide 3 - 3 Innovation-Mindset
  visual_mode: static-hold

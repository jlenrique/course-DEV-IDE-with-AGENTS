      Cluster boundary head introducing the four-archetype lineage. Medium content density —
      four archetypes with inventor names and brief descriptors. Medium visual load:
      four-column icon layout, legible text. Word budget 100 supports full four-archetype
      survey including specific device/process exemplars and framing with the lineage close.
    onset_delay: 0.5
    dwell: 1.5
    cluster_gap: 0.5
    transition_buffer: 1.0
    narration_text: >
      Let's turn to the physician innovator lineage — a heritage that already belongs to you.
      Before this course asks you to innovate, it asks you to recognize where you already
      stand. Physician innovation is not new — it has a lineage, and four distinct archetypes.
      Device innovators like Fogarty channeled surgical empathy and domain expertise — turned
      a clinical observation of a patient in crisis into the balloon catheter.
      Process innovators like Pronovost engineered a five-step checklist that cut ICU infection
      rates to near zero, where others saw an irreducible limitation — the raw material was
      already in their hands. Technology innovators like Bath filed a patent born from clinical
      domain expertise that changed ophthalmology. And organizational innovators redesigned
      entire systems from reactive sick care toward proactive health assurance. Your archetype
      is already inside this lineage. Moving forward, we'll examine what each archetype built.
    behavioral_intent: >
      Activate prior clinical knowledge by connecting the learner's professional identity
      to a recognized lineage of physician innovators — making innovation feel inherited,
      not invented.
    master_behavioral_intent: >
      Connect learner identity to the physician innovator lineage before introducing
      individual archetypes.
    isolation_target: null
    narration_burden: null
    develop_type: null
    double_dispatch_eligible: false

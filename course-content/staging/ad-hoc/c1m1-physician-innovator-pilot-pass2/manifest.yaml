- id: seg-05
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-05
  narration_text: 'When we say physicians innovate, we’re not speaking abstractly.
    **Thomas Fogarty** helped transform vascular surgery with device thinking. **Peter
    Pronovost** turned a checklist into a global patient-safety movement — that’s
    **process** innovation at scale. **Patricia Bath** advanced how we treat cataracts
    — technology tied to access. And at the **organizational** level, health systems
    have shifted from purely reactive sick care toward models that try to engineer
    health. Different levers — same through-line: physicians who refused to treat
    broken systems as immutable.'
  behavioral_intent: proud
  voice_id: null

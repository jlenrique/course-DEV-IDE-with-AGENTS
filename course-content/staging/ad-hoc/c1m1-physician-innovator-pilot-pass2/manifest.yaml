- id: seg-06
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-06
  narration_text: 'Here’s the reframe many clinicians need: **physicianship** and
    **innovation leadership** draw on the same muscle groups — *empathy* for who suffers,
    *curiosity* when data surprises you, *analytical discipline* when noise is loud,
    *comfort with ambiguity* when the right next step isn’t obvious, and *resilience*
    when the first fix fails. You are not being asked to become someone else. You’re
    being asked to aim traits you already exercise at the bedside toward **systems
    and operations** — where harm and waste also hide.'
  behavioral_intent: reassuring
  voice_id: null

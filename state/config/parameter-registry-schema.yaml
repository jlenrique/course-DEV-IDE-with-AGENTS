      - rich
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: slide_mode_proportions
    family: run-constants
    type: object
    status: implemented
    source: scripts/utilities/run_constants.py
    consumers:
      - scripts/utilities/run_constants.py
    description: "Resolved creative mode distribution map (literal-text, literal-visual, creative) for run constants."
  - key: experience_profile

cases:
  - case_id: T1-text2video-std-silent
    description: Baseline silent text-to-video probe on Kling 2.6 standard.
    api_surface: current_repo_client
    operation: text2video
    model_name: kling-v2-6
    mode: std
    duration: "5"
    aspect_ratio: "16:9"
    requested_audio_mode: silent
    prompt: >
      Busy hospital corridor in a modern medical center, soft camera drift,
      clinicians moving through frame, cool clean healthcare palette, credible
      professional atmosphere, no text overlays.
    tags:
      - text2video
      - silent
      - baseline
  - case_id: T2-text2video-pro-native-audio
    description: Native-audio probe on Kling 2.6 pro to learn actual provider behavior.

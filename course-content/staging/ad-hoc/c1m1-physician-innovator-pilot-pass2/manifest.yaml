- id: seg-08
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-08
  narration_text: '**Entrepreneurship** and **intrapreneurship** are cousins, not
    duplicates. An entrepreneur often builds something new from the outside. An **intrapreneur**
    drives innovation **inside** an existing organization — navigating politics, capital,
    brand, and scale that already exist. For many of you, the fastest path to impact
    is intrapreneurial: improve the system that already trusts you with patients.
    That requires stakeholder alignment — a skill we’ll return to, especially around
    your capstone.'
  behavioral_intent: pragmatic
  voice_id: null

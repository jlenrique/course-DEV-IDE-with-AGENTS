- id: seg-01
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-01
  narration_text: 'Welcome to Course One, Module One. This isn’t a detour from your
    clinical identity — it’s an extension of it. Over the next few minutes we’ll make
    a single argument plain: *the physician as innovator* is not a separate job title
    you apply for. It’s a way of seeing the system you already work inside — and a
    set of skills you can develop without leaving the mission that brought you to
    medicine.'
  behavioral_intent: credible
  voice_id: null

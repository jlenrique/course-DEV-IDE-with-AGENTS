# Tool Parameter Preferences — Per-tool settings agents apply automatically.
#
# PURPOSE: Mutable, per-deployment dial settings for each tool integration.
# Agents check these before generating content. Marcus elicits missing values
# conversationally and saves learned preferences back here.
#
# NOT FOR: Brand identity, visual design, voice/tone, or accessibility standards.
# Those live in resources/style-bible/ (authoritative) and config/content-standards.yaml
# (bootstrap fallback). See docs/directory-responsibilities.md for the full map.

brand:
  colors:
    primary: ""
    secondary: ""
    accent: ""
  fonts:
    heading: ""
    body: ""

tool_parameters:
  gamma:
    default_llm: ""         # e.g. "claude-3", "gpt-4o"
    style: ""               # e.g. "professional-medical", "modern-clean"
    format: ""              # e.g. "presentation", "document"
    slides_per_section: null

  elevenlabs:
    default_voice_id: ""
    stability: 0.5
    similarity_boost: 0.75
    style: 0.0
    model_id: ""            # e.g. "eleven_multilingual_v2"
    output_format: "mp3_44100_128"

  canvas:
    default_course_id: ""
    default_module_position: "end"
    publish_immediately: false

  qualtrics:
    default_survey_language: "EN"
    question_numbering: true
    progress_bar: true

  canva:
    brand_template_id: ""
    default_design_type: ""

  botpress:
    default_bot_id: ""
    language: "en"

  wondercraft:
    default_voice: ""
    format: "podcast"

  kling:
    default_model: ""       # e.g. "kling-v3"
    aspect_ratio: "16:9"
    duration: 5

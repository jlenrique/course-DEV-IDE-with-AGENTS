gate: "G5"
gate_name: "Audio"
producing_agent: "elevenlabs-voice-director"
hil_gate: null
source_of_truth:
  primary: "Narration script (exact text, pronunciation guides, timing estimates)"
  schema_ref: "skills/bmad-agent-content-creator/references/template-narration-script.md"

criteria:
  - id: "G5-01"
    name: "Script accuracy"
    description: "Spoken words match narration script text — verified via audio sensory bridge (STT transcription)"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: critical
    evaluation_type: agentic
    check: "STT transcript word sequence matches narration script text with word-error-rate < 5%"
    requires_perception: true
    perception_modality: audio

  - id: "G5-02"
    name: "WPM compliance"
    description: "Speaking rate within target range for instructional narration"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: medium
    evaluation_type: deterministic
    check: "audio_bridge.wpm is between 130 and 170 WPM"
    requires_perception: true
    perception_modality: audio

  - id: "G5-03"
    name: "Pronunciation accuracy"
    description: "Medical/clinical terms match pronunciation guide in the narration script"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: high
    evaluation_type: agentic
    check: "Terms listed in the pronunciation guide are spoken correctly per STT transcript — phonetic mismatches flagged"
    requires_perception: true
    perception_modality: audio

  - id: "G5-04"
    name: "No audio invention"
    description: "No spoken words that are not in the narration script (hallucinated audio)"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: critical
    evaluation_type: agentic
    check: "STT transcript contains no words, phrases, or sentences absent from the narration script"
    requires_perception: true
    perception_modality: audio

  - id: "G5-05"
    name: "Duration alignment"
    description: "Audio duration within tolerance of estimated duration from narration script"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: medium
    evaluation_type: deterministic
    check: "audio_bridge.total_duration_ms is within ±15% of narration_script.estimated_duration"
    requires_perception: true
    perception_modality: audio

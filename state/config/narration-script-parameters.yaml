# Narration Script Parameters — script-level tunable knobs for Irene Pass 2.
#
# These parameters govern how Irene writes narration across ALL segments.
# They complement narration-grounding-profiles.yaml (per-fidelity channel balance)
# with script-wide stylistic and pedagogical controls.
#
# Designed in Party Mode Round 4 (2026-03-30).
# Consumed by: Irene Pass 2, G4 Narration Script gate, quality-reviewer agent.
# Contract: state/config/fidelity-contracts/g4-narration-script.yaml

schema_version: "1.1"

# ---------------------------------------------------------------------------
# 1. narration_density — how much to say per slide
# ---------------------------------------------------------------------------
narration_density:
  target_wpm: 150              # speaking rate (ElevenLabs calibration)
  mean_words_per_slide: 95     # default ballpark across all slides
  min_words_per_slide: 25      # breathing room for visual-heavy slides
  max_words_per_slide: 220     # cap on any single segment
  cluster_narration:
    # NOTE: These are defaults. When an experience profile is active, the
    # profile's cluster_expansion.head_words and interstitial_words ranges
    # take precedence. See state/config/experience-profiles.yaml.
    cluster_head_word_range: [80, 140]  # head slide establishes concept + arc for the full cluster
    interstitial_word_range: [25, 40]   # interstitials stay terse, isolation-targeted, and visual-led (roughly 70/30 visual-to-narration)

# ---------------------------------------------------------------------------
# 2. slide_echo — how much narration mirrors visible slide text
# ---------------------------------------------------------------------------
# Values: verbatim | paraphrase | inspired
#   verbatim   — reads visible text nearly word-for-word (disclaimers, key defs)
#   paraphrase — restates in conversational language (default)
#   inspired   — departs from slide text, uses it as launching point
slide_echo:
  default: paraphrase
  per_fidelity_override:
    creative: inspired
    literal-text: paraphrase
    literal-visual: paraphrase
  allow_verbatim: true         # permit per-segment override to verbatim

# ---------------------------------------------------------------------------
# 3. visual_narration — how to handle on-screen visuals in speech
# ---------------------------------------------------------------------------
# deictic_references: none | minimal | moderate | frequent
# description_depth:  identify | summarize | detailed
visual_narration:
  deictic_references: minimal
  description_depth: summarize
  reference_function: audience_guidance  # cues should guide learner attention, not annotate slide furniture
  orientation_cue_policy: brief_only    # spatial orientation is allowed only when it resolves ambiguity
  visual_silence_permitted: true   # allow 2-3 sec pauses for full-bleed images
  visual_references_per_slide: 2   # Story 13.2: explicit visual element references in narration
  meta_slide_language: forbidden   # reject production-meta / slide-tour phrasing in audience-facing narration
  forbidden_meta_phrases:
    - approved slide
    - slide title
    - this slide shows
    - the slide shows
    - the slide presents
    - centered below the title
    - panel on the left
    - panel on the right
    - box on the left
    - box on the right
    - banner at the bottom
    - across the slide
    - numbered objective rows
  visual_references_tolerance: 1   # ±1 from target is acceptable

# ---------------------------------------------------------------------------
# 4. terminology_treatment — when and how to gloss technical terms
# ---------------------------------------------------------------------------
# gloss_strategy: inline_appositive | parenthetical_aside | no_gloss
# gloss_on:       first_mention | every_mention | never
# audience_assumption: novice | intermediate | expert
terminology_treatment:
  gloss_strategy: inline_appositive
  gloss_on: first_mention
  audience_assumption: expert
  gloss_domain_filter:
    - business
    - finance
    - technology

# ---------------------------------------------------------------------------
# 5. pedagogical_bridging — transition style between segments
# ---------------------------------------------------------------------------
# transition_style: conceptual | sequential | question_driven | narrative_arc
# bridge_frequency_scale: how verbose spoken bridging lines are when they appear
#   (minimal | moderate | rich). Authoritative scheduling caps live under
#   runtime_variability.bridge_cadence (minutes + slides between explicit bridges).
pedagogical_bridging:
  transition_style: conceptual
  bridge_frequency_scale: moderate
  within_cluster_bridge_policy:
    default: none              # suppress spoken bridges inside clusters by default
    tension_position_override: pivot  # reserved for tension interstitials that need a brief tonal turn ("but", "however", "yet")
  cluster_boundary_bridge_style:
    mode: synthesis_plus_forward_pull
    target_seconds: [15, 20]
    target_words: [37, 50]
  spoken_bridge_policy:
    # off = skip deterministic spoken-bridge cue checks
    # warn = emit warnings (promoted to errors when Pass 2 runtime_policy_strict)
    # error = always fail closed when narration_text lacks cues for manifest bridge_type
    enforcement: warn
    intro_phrase_patterns:
      - "in this section"
      - "let's turn to"
      - "we'll begin"
      - "welcome"
      - "to start"
    outro_phrase_patterns:
      - "next, we'll"
      - "to wrap up"
      - "moving forward"
      - "in summary"
      - "that brings us"

# ---------------------------------------------------------------------------
# 6. engagement_stance — narrator-learner relationship
# ---------------------------------------------------------------------------
# posture: lecturer | collegial_guide | coach | storyteller
engagement_stance:
  posture: collegial_guide
  direct_address: true            # use "you" for direct engagement
  rhetorical_questions: moderate  # none | occasional | moderate | frequent
  clinical_vignettes: permitted   # permitted | encouraged | none

# ---------------------------------------------------------------------------
# 7. source_depth — how deep into extraction material per fidelity class
# ---------------------------------------------------------------------------
# creative:  describe_visual | teach_behind | full_synthesis
# literal:   confirm_visible | light_enrich | full_synthesis
source_depth:
  creative_slides: teach_behind
  literal_slides: confirm_visible

# ---------------------------------------------------------------------------
# 8. pronunciation_sensitivity — flagging policy for ElevenLabs downstream
# ---------------------------------------------------------------------------
# phonetic_format: IPA_lite | respelling | both
# flag_threshold:  all_technical | medical_and_proper_nouns | manual_only
pronunciation_sensitivity:
  auto_flag: true
  phonetic_format: IPA_lite
  flag_threshold: medical_and_proper_nouns

# ---------------------------------------------------------------------------
# 9. runtime_variability -- how Irene earns slide-length differences
# ---------------------------------------------------------------------------
runtime_variability:
  enabled: true
  required_manifest_fields:
    - timing_role
    - content_density
    - visual_detail_load
    - duration_rationale
    - bridge_type
    - onset_delay
    - dwell
    - cluster_gap
    - transition_buffer
  allowed_timing_roles:
    - anchor
    - concept-build
    - evidence-walkthrough
    - framework-walkthrough
    - example
    - transition
    - reflection
    - checkpoint
    - summary
    - call-to-action
  allowed_density_levels:
    - light
    - medium
    - heavy
  rationale_dimensions:
    purpose:
      - purpose
      - role
      - transition
      - anchor
      - reflection
      - summary
      - walkthrough
      - build
      - checkpoint
    density:
      - detail
      - density
      - complexity
      - scaffold
      - unpack
      - explain
      - concept
      - framework
    visual:
      - visual
      - illustration
      - diagram
      - chart
      - table
      - roadmap
      - figure
      - text-heavy
      - labels
  bridge_cadence:
    enabled: true
    require_intro_or_outro_every_minutes: 3.0
    require_intro_or_outro_every_slides: 5
    cluster_bridge_cadence_override: true
    accepted_bridge_types:
      - intro
      - outro
      - both
      - pivot
      - cluster_boundary

# ---------------------------------------------------------------------------
# 10. narration_profile_controls -- high-level narration shaping knobs
# ---------------------------------------------------------------------------
# narrator_source_authority:
#   source-grounded  -> prioritize extracted/source-backed claims first
#   balanced         -> balance source grounding with slide rhetoric
#   slide-led        -> prioritize slide-forward explanations and cues
#
# slide_content_density:
#   lean     -> concise narration relative to visible slide content
#   adaptive -> default; adapts by timing_role/content_density
#   dense    -> richer explanatory layer beyond visible text
#
# elaboration_budget:
#   low      -> prioritize brevity and directness
#   medium   -> default explanatory depth
#   high     -> allow expanded explanation and examples
#
# connective_weight:
#   light    -> minimal connective phrasing between points
#   balanced -> default connective pacing
#   heavy    -> explicit connective stitching throughout
#
# callback_frequency:
#   sparse   -> occasional call-backs to prior concepts
#   moderate -> default call-back cadence
#   frequent -> frequent call-backs for narrative continuity
#
# visual_narration_coupling:
#   loose    -> visual references are occasional and selective
#   balanced -> default coupling between spoken and visual channels
#   tight    -> strong coupling with frequent visual anchoring
#
# rhetorical_richness:
#   restrained -> plain, direct phrasing
#   balanced   -> moderate rhetorical variety
#   expressive -> richer rhetorical shaping
#
# vocabulary_register:
#   accessible -> plain-language instructional vocabulary
#   professional -> domain-professional tone (default)
#   specialist -> specialist/technical register
#
# arc_awareness:
#   low      -> minimal explicit arc signaling
#   medium   -> default arc continuity signaling
#   high     -> explicit arc markers and progression cues
#
# narrative_tension:
#   low      -> low-intensity, explanatory cadence
#   medium   -> default instructional tension
#   high     -> stronger tension-and-release shaping
#
# emotional_coloring:
#   neutral  -> objective instructional tone
#   warm     -> supportive/encouraging emotional color
#   vivid    -> stronger emotional coloration when appropriate
narration_profile_controls:
  narrator_source_authority: balanced
  slide_content_density: adaptive
  elaboration_budget: medium
  connective_weight: balanced
  callback_frequency: moderate
  visual_narration_coupling: balanced
  rhetorical_richness: balanced
  vocabulary_register: professional
  arc_awareness: medium
  narrative_tension: medium
  emotional_coloring: neutral

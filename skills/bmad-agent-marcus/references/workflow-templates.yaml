version: 1
notes: "Canonical workflow template registry for Marcus production planning."
workflow_templates:
  lecture-slides:
    label: "Lecture Slides"
    aliases: []
    stages:
      - stage: "outline"
        specialist: "content-creator"
        description: "Draft learning-objective-aligned outline"
      - stage: "slides"
        specialist: "gamma-specialist"
        description: "Generate slide deck from outline"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: style bible compliance, Bloom's alignment"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  case-study:
    label: "Case Study"
    aliases: []
    stages:
      - stage: "draft"
        specialist: "content-creator"
        description: "Draft clinical case with learning integration"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: clinical accuracy, pedagogical alignment"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  assessment:
    label: "Assessment / Quiz"
    aliases: []
    stages:
      - stage: "draft"
        specialist: "content-creator"
        description: "Draft assessment items aligned to objectives"
      - stage: "alignment-check"
        specialist: "quality-reviewer"
        description: "Verify assessment-objective tracing"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"
      - stage: "publish"
        specialist: "canvas-specialist"
        description: "Publish to LMS"

  discussion-prompt:
    label: "Discussion Prompt"
    aliases: []
    stages:
      - stage: "draft"
        specialist: "content-creator"
        description: "Draft discussion prompt with facilitation notes"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"
      - stage: "publish"
        specialist: "canvas-specialist"
        description: "Publish to LMS"

  video-script:
    label: "Video Script"
    aliases: []
    stages:
      - stage: "draft"
        specialist: "content-creator"
        description: "Draft video script with visual cues"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: content accuracy, pacing"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  animated-explainer:
    label: "Animated Explainer"
    aliases: []
    stages:
      - stage: "brief"
        specialist: "content-creator"
        description: "Draft instructional brief for animation"
      - stage: "storyboard"
        specialist: "vyond-specialist"
        description: "Produce storyboard and Vyond build guidance"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: instructional clarity and pacing"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  bespoke-medical-illustration:
    label: "Bespoke Medical Illustration"
    aliases: []
    stages:
      - stage: "prompting"
        specialist: "midjourney-specialist"
        description: "Generate parameterized prompt package and iteration plan"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: visual fidelity and instructional fit"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  voiceover:
    label: "Voiceover Narration"
    aliases: []
    stages:
      - stage: "script"
        specialist: "content-creator"
        description: "Draft narration script"
      - stage: "script-review"
        specialist: "quality-reviewer"
        description: "Quality gate: tone, clarity, pacing"
      - stage: "script-checkpoint"
        specialist: "human"
        description: "Script approval before synthesis"
      - stage: "synthesis"
        specialist: "elevenlabs-specialist"
        description: "Voice synthesis from approved script"
      - stage: "audio-checkpoint"
        specialist: "human"
        description: "Audio review and approval"

  interactive-module:
    label: "Interactive Module"
    aliases: []
    stages:
      - stage: "design"
        specialist: "content-creator"
        description: "Design interaction model and content flow"
      - stage: "author"
        specialist: "articulate-specialist"
        description: "Build Storyline or Rise interaction guidance and branching map"
      - stage: "deploy"
        specialist: "coursearc-specialist"
        description: "Prepare LTI embedding and SCORM deployment checklist"
      - stage: "review"
        specialist: "quality-reviewer"
        description: "Quality gate: interaction design, accessibility"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  coursearc-deployment:
    label: "CourseArc Deployment"
    aliases: []
    stages:
      - stage: "package-check"
        specialist: "coursearc-specialist"
        description: "Validate LTI 1.3 and SCORM deployment prerequisites"
      - stage: "accessibility-check"
        specialist: "quality-reviewer"
        description: "Quality gate: WCAG 2.1 AA interactive compliance"
      - stage: "checkpoint"
        specialist: "human"
        description: "User review and approval"

  narrated-deck-video-export:
    label: "Narrated Deck Video Export"
    aliases: []
    stages:
      - stage: "source-wrangling"
        specialist: "source-wrangler"
        description: "Build source bundle from Notion, Box, and uploaded materials"
      - stage: "lesson-plan-and-slide-brief"
        specialist: "content-creator"
        description: "Irene Pass 1: produce lesson plan and slide brief with fidelity tags"
      - stage: "fidelity-g1"
        specialist: "fidelity-assessor"
        description: "Verify lesson plan against source bundle"
      - stage: "fidelity-g2"
        specialist: "fidelity-assessor"
        description: "Verify slide brief against lesson plan"
      - stage: "quality-g2"
        specialist: "quality-reviewer"
        description: "Review lesson plan and slide brief quality before user approval"
      - stage: "gate-1"
        specialist: "human"
        description: "User approves lesson plan and slide brief"
      - stage: "imagine-handoff"
        specialist: "human"
        description: "Confirm rebranded literal-visual assets and hosted URLs for Gamma"
      - stage: "slide-generation"
        specialist: "gamma-specialist"
        description: "Generate slides from approved brief and diagram cards"
      - stage: "storyboard"
        specialist: "bmad-agent-marcus"
        description: "Generate storyboard bundle for slide review and downstream authorization"
      - stage: "fidelity-g3"
        specialist: "fidelity-assessor"
        description: "Verify generated slides against slide brief"
      - stage: "quality-g3"
        specialist: "quality-reviewer"
        description: "Review generated slides for brand, accessibility, and hierarchy"
      - stage: "gate-2"
        specialist: "human"
        description: "User approves slides for narration handoff"
      - stage: "narration-and-manifest"
        specialist: "content-creator"
        description: "Irene Pass 2: produce narration script and segment manifest"
      - stage: "fidelity-g4"
        specialist: "fidelity-assessor"
        description: "Verify narration script against approved slides and lesson plan"
      - stage: "quality-g4"
        specialist: "quality-reviewer"
        description: "Review narration script and segment manifest quality"
      - stage: "gate-3"
        specialist: "human"
        description: "User approves narration script and manifest"
      - stage: "voice-selection"
        specialist: "human"
        description: "User reviews ElevenLabs catalog previews and locks the lesson-level voice before synthesis"
      - stage: "audio-generation"
        specialist: "elevenlabs-specialist"
        description: "Generate narration audio, captions, and audio metadata"
      - stage: "fidelity-g5"
        specialist: "fidelity-assessor"
        description: "Verify generated audio against narration script"
      - stage: "pre-composition-validation"
        specialist: "quality-reviewer"
        description: "Validate assembly bundle inputs before Descript handoff"
      - stage: "composition-guide"
        specialist: "compositor"
        description: "Generate Descript assembly guide and sync approved stills into the bundle"
      - stage: "post-composition-validation"
        specialist: "quality-reviewer"
        description: "Validate the exported MP4 and captions after manual assembly"
      - stage: "gate-4"
        specialist: "human"
        description: "User reviews the assembled narrated presentation package"

  narrated-lesson-with-video-or-animation:
    label: "Narrated Lesson With Video Or Animation"
    aliases: []
    stages:
      - stage: "source-wrangling"
        specialist: "source-wrangler"
        description: "Build source bundle from Notion, Box, and uploaded materials"
      - stage: "lesson-plan-and-slide-brief"
        specialist: "content-creator"
        description: "Irene Pass 1: produce lesson plan and slide brief with fidelity tags"
      - stage: "fidelity-g1"
        specialist: "fidelity-assessor"
        description: "Verify lesson plan against source bundle"
      - stage: "fidelity-g2"
        specialist: "fidelity-assessor"
        description: "Verify slide brief against lesson plan"
      - stage: "quality-g2"
        specialist: "quality-reviewer"
        description: "Review lesson plan and slide brief quality before user approval"
      - stage: "gate-1"
        specialist: "human"
        description: "User approves lesson plan and slide brief"
      - stage: "imagine-handoff"
        specialist: "human"
        description: "Confirm rebranded literal-visual assets and hosted URLs for Gamma"
      - stage: "slide-generation"
        specialist: "gamma-specialist"
        description: "Generate slides from approved brief and diagram cards"
      - stage: "storyboard"
        specialist: "bmad-agent-marcus"
        description: "Generate storyboard bundle for slide review and downstream authorization"
      - stage: "fidelity-g3"
        specialist: "fidelity-assessor"
        description: "Verify generated slides against slide brief"
      - stage: "quality-g3"
        specialist: "quality-reviewer"
        description: "Review generated slides for brand, accessibility, and hierarchy"
      - stage: "gate-2"
        specialist: "human"
        description: "User approves slides for motion planning and narration handoff"
      - stage: "gate-2m"
        specialist: "human"
        description: "User designates approved slides as static, video, or animation"
      - stage: "motion-generation"
        specialist: "bmad-agent-marcus"
        description: "Route motion-designated slides to Kling or manual guidance and collect assets"
      - stage: "motion-gate"
        specialist: "human"
        description: "User reviews generated/imported motion assets before Irene Pass 2"
      - stage: "narration-and-manifest"
        specialist: "content-creator"
        description: "Irene Pass 2: produce narration script and motion-aware segment manifest"
      - stage: "fidelity-g4"
        specialist: "fidelity-assessor"
        description: "Verify narration script against approved slides and lesson plan"
      - stage: "quality-g4"
        specialist: "quality-reviewer"
        description: "Review narration script and segment manifest quality"
      - stage: "gate-3"
        specialist: "human"
        description: "User approves narration script and manifest"
      - stage: "voice-selection"
        specialist: "human"
        description: "User reviews ElevenLabs catalog previews and locks the lesson-level voice before synthesis"
      - stage: "audio-generation"
        specialist: "elevenlabs-specialist"
        description: "Generate narration audio, captions, and audio metadata"
      - stage: "fidelity-g5"
        specialist: "fidelity-assessor"
        description: "Verify generated audio against narration script"
      - stage: "pre-composition-validation"
        specialist: "quality-reviewer"
        description: "Validate assembly bundle inputs before Descript handoff"
      - stage: "composition-guide"
        specialist: "compositor"
        description: "Generate Descript assembly guide and sync approved stills plus motion assets into the bundle"
      - stage: "post-composition-validation"
        specialist: "quality-reviewer"
        description: "Validate the exported MP4 and captions after manual assembly"
      - stage: "gate-4"
        specialist: "human"
        description: "User reviews the final narrated video package"

  clustered-narrated-deck-video-export:
    label: "Clustered Narrated Deck Video Export (Interstitial MVP)"
    aliases: ["cluster-presentation"]
    stages:
      - stage: "source-wrangling"
        specialist: "source-wrangler"

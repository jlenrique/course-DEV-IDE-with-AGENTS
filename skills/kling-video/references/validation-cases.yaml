  - case_id: V3-public-surface-probe
    description: Exploratory probe template for the newer Kling Singapore API surface. Current docs indicate the same AK/SK token auth model, but the exact 3.0 model id still needs account-level verification.
    api_surface: newer_public_surface
    lane: validation-only
    production_safe: false
    promotion_status: non-promoting
    operation: text2video
    model_name: kling-v3
    mode: pro
    duration: "10"
    aspect_ratio: "16:9"
    requested_audio_mode: silent
    prompt: >
      Multi-angle cinematic professional montage with richer scene variation and
      restrained realism, intended as a public-surface 3.0 capability probe.
    tags:
      - 3.0
      - singapore-surface
      - capability-probe
      - model-id-may-vary
  - case_id: V3-public-surface-native-audio-probe
    description: Exploratory 3.0 Singapore-surface probe that intentionally asks Kling for native ambience/SFX if the account and surface support it.
    api_surface: newer_public_surface
    lane: validation-only
    production_safe: false
    promotion_status: non-promoting
    audio_policy: exploratory-native-audio
    operation: text2video
    model_name: kling-v3
    mode: pro
    duration: "10"
    aspect_ratio: "16:9"
    requested_audio_mode: native-sfx
    prompt: >
      Multi-angle professional montage in a modern workplace with restrained
      realism, soft movement, and plausible native ambience such as footsteps,
      room tone, and subtle environmental detail if supported.
    tags:
      - 3.0
      - singapore-surface
      - native-audio
      - sfx
      - capability-probe
      - model-id-may-vary
  - case_id: V3-public-surface-image2video-native-audio-probe
    description: Exploratory 3.0 Singapore-surface image-to-video probe with native ambience/SFX enabled. Intended for approved stills or selected Gamma visuals once a public image URL is supplied.
    api_surface: newer_public_surface
    lane: validation-only
    production_safe: false
    promotion_status: non-promoting
    audio_policy: exploratory-native-audio
    operation: image2video
    model_name: kling-v3
    mode: pro
    duration: "10"
    aspect_ratio: "16:9"
    requested_audio_mode: native-sfx
    prompt: >
      Bring this still image to life with richer scene motion while preserving
      the main composition, and include subtle native ambience or contextual
      environmental sound if supported.
    image_url: null
    image_url_hint: Public URL to the selected still image.
    tags:
      - 3.0
      - singapore-surface
      - image2video
      - native-audio
      - sfx
      - capability-probe
      - model-id-may-vary

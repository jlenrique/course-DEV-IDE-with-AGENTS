    status: implemented
    source: scripts/utilities/run_constants.py
  - key: execution_mode
    family: run-constants
    type: enum
    allowed_values:
      - tracked/default
      - ad-hoc
    aliases:
      tracked: tracked/default
      default: tracked/default
      ad_hoc: ad-hoc
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: quality_preset
    family: run-constants
    type: enum
    allowed_values:
      - explore
      - draft
      - production
      - regulated
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: double_dispatch
    family: run-constants
    type: boolean
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: motion_enabled
    family: run-constants
    type: boolean
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: motion_budget.max_credits
    family: run-constants
    type: float
    constraints:
      minimum_exclusive: 0
    status: implemented
    source: scripts/utilities/run_constants.py
  - key: motion_budget.model_preference
    family: run-constants
    type: enum
    allowed_values:
      - std

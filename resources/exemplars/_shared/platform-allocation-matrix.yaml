version: "1.0"
review_cycle: "quarterly"
last_reviewed: "2026-03-30"

platforms:
  - canvas
  - coursearc
  - panopto
  - direct-embed

rules:
  required_canvas_flags:
    - graded
    - peer_discussion
    - instructor_facilitation

  preferred_coursearc_content_types:
    - narrated-lesson
    - interactive-module
    - media-rich-lesson
    - orientation
    - case-study

  preferred_panopto_content_types:
    - recorded-lecture
    - long-form-video
    - webinar-replay

  preferred_direct_embed_content_types:
    - quick-reference
    - external-tool-link

  high_interactivity_levels:
    - high
    - very-high

  default_platform: canvas

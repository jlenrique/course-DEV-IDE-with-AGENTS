gate: "G1"
gate_name: "Lesson Plan"
producing_agent: "irene"
hil_gate: "Gate 1"
source_of_truth:
  primary: "Source bundle (extracted.md) + SME learning intent"
  schema_ref: "skills/bmad-agent-content-creator/references/template-lesson-plan.md"

# Criterion ordering contract (enforced by scripts/validate_fidelity_contracts.py):
# Deterministic before agentic; every agentic criterion declares blocks_on: with
# at least one deterministic sibling id. See party-mode decision record
# reports/dev-coherence/2026-04-16-2350/.

criteria:
  # ==== Deterministic group ====

  - id: "G1-02"
    name: "LO structure completeness"
    description: "Each learning objective has a Bloom's Level tag and traces to at least one content block"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: high
    evaluation_type: deterministic
    check: "Every LO entry has non-empty bloom_level; every LO is referenced by at least one content block's Objective Served field"
    requires_perception: false

  - id: "G1-03"
    name: "Content block completeness"
    description: "Each content block has all required fields: Objective Served, Content Type, Writer Delegation, Behavioral/Affective Goal"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: high
    evaluation_type: deterministic
    check: "Every Block N section contains non-empty Objective Served, Content Type, Writer Delegation, and Behavioral/Affective Goal fields"
    requires_perception: false

  - id: "G1-04"
    name: "Assessment alignment"
    description: "Assessment hooks table covers all learning objectives — no LO without an assessment hook"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: critical
    evaluation_type: deterministic
    check: "Every LO appears in at least one row of the assessment hooks table"
    requires_perception: false

  - id: "G1-05"
    name: "No orphaned content"
    description: "Every content block traces to a learning objective — no content exists without pedagogical justification"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: medium
    evaluation_type: deterministic
    check: "Every content block's Objective Served field references a valid LO from the lesson plan header"
    requires_perception: false

  # ==== Agentic group ====

  - id: "G1-01"
    name: "Source theme coverage"
    description: "Every major theme in the source bundle is represented by at least one learning objective"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: critical
    evaluation_type: agentic
    check: "For each major section/theme in extracted.md, at least one LO addresses that theme (source_ref linkage when available)"
    requires_perception: false
    blocks_on: ["G1-02", "G1-03"]

  - id: "G1-06"
    name: "No content invention"
    description: "Lesson plan does not introduce clinical claims, statistics, or domain assertions not present in the source bundle"
    fidelity_class: [creative, literal-text, literal-visual]
    severity: critical
    evaluation_type: agentic
    check: "Domain-specific factual assertions in the lesson plan can be traced to corresponding content in extracted.md"
    requires_perception: false
    blocks_on: ["G1-02", "G1-03"]

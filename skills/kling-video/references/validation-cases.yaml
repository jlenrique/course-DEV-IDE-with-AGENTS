    model_name: kling-v2-6
    mode: pro
    duration: "5"
    aspect_ratio: "16:9"
    requested_audio_mode: native
    prompt: >
      Busy hospital corridor with soft ambient footsteps, gentle monitor beeps,
      and a restrained cinematic push-in on a fatigued physician reviewing a
      dense electronic chart, credible real-world healthcare tone.
    tags:
      - text2video
      - native-audio
      - exploratory

 Could be prepass: yes. Feeds scanner: execution-deps or workflow integrity. Reusable across skills: partial (woodshed + catalog schema). Help pattern savings: n/a.", "action": "Script loads `_catalog.yaml`, surfaces `circuit_breaker` limits, current attempt tallies from session state file or env, and emits PASS/WARN/BLOCK with reasons — LLM only handles exceptions.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "structure", "file": "references/init.md", "line": 6, "title": "First-run sidecar file and directory initialization described as LLM steps", "description": "Determinism confidence: certain. Estimated token savings: 150-400 on first run. Implementation complexity: trivial. Language: either. Could be prepass: no (one-shot bootstrap). Feeds scanner: n/a. Reusable across skills: yes (template for other agent sidecars). Help pattern savings: `init_gamma_sidecar.sh --help` can list created paths instead of duplicating in init.md.", "action": "Replace procedural markdown with a bash or Python bootstrap that creates `_bmad/memory/gamma-specialist-sidecar/`, writes stub `index.md`, `patterns.md`, `chronology.md`, and seeds `access-boundaries.md` from a template.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "transformation", "file": "references/style-guide-integration.md", "line": 21, "title": "Documented parameter merge order is a deterministic deep-merge over YAML sources", "description": "Determinism confidence: high for layers 1-4 when inputs are structured. Estimated token savings: 200-500 per recommendation when style guide + template + envelope are merged mechanically. Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: parameter recommendation prepass. Reusable across skills: yes. Help pattern savings: `--merge-order` in script help replaces verbose merge bullets.", "action": "Implement `merge_gamma_parameters.py` that takes paths or stdin for API defaults, style guide slice, CT template, and envelope overrides; outputs resolved YAML/JSON; Gary only adjusts layer 5 (per-request judgment).", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-008", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "extraction", "file": "references/exemplar-study.md", "line": 19, "title": "Structured fields from exemplar brief.md listed for manual extraction", "description": "Determinism confidence: moderate (depends on brief.md conventions). Estimated token savings: 150-400 per exemplar when headings are stable. Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: exemplar study prepass. Reusable across skills: partial. Help pattern savings: n/a.", "action": "Parser script extracts frontmatter and/or fixed heading sections from `brief.md` into JSON (layout pattern, pedagogical type, agent guidance); LLM retains visual analysis of `source/` artifacts only.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-009", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "comparison", "file": "references/exemplar-study.md", "line": 56, "title": "Markdown exemplar table duplicates authoritative _catalog.yaml", "description": "Determinism confidence: certain for drift detection. Estimated token savings: 50-150 per edit cycle (avoid human/LLM sync errors). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: structure scanner. Reusable across skills: yes. Help pattern savings: n/a.", "action": "CI or script generates the markdown table from `_catalog.yaml`, or lints that table rows match YAML ids — single source of truth.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-010", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "postprocessing", "file": "references/quality-assessment.md", "line": 29, "title": "quality_assessment YAML structure could be validated after LLM fills scores", "description": "Determinism confidence: certain. Estimated token savings: 100-300 per return when invalid shape would trigger retries. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: postprocessing hook for Marcus. Reusable across skills: yes. Help pattern savings: jsonschema/yamllint errors replace long 'format' prose in prompts over time.", "action": "Add validation script (jsonschema or pydantic) for the documented `quality_assessment` object including required dimension keys and 0.0-1.0 bounds.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "frontmatter", "file": "SKILL.md", "line": 3, "title": "Description trigger clause omits quoted invocation phrases", "description": "The BMad structure guidelines recommend a two-part description whose trigger clause uses quoted specific phrases (for example 'talk to Gary') to reduce ambiguous activations. The current description uses paraphrased triggers (talk to Gary, Slide Architect, presentation slides) without quotes, which is slightly weaker for conservative routing versus similar slide or Gamma-related skills.", "action": "Revise the y", "rank": 3, "category": "edge-case", "file": "references/content-type-mapping.md", "line": 93, "title": "Templates assume medical physician audience; non-clinical courses still map through medical framing", "description": "When Marcus passes a non-medical content type or audience, Gary is instructed to pick the closest template — tone and audience strings remain medically scoped, which can skew Gamma's text generation until manually overridden.", "action": "Add a short 'audience override' note: when envelope.audience differs from template, replace tone/audience in the merged YAML before call; optionally add one non-medical template stub.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "references/save-memory.md", "line": 11, "title": "Session end and 'meaningful learning' are subjective for when to save", "description": "Save triggers include 'session end if meaningful learning' without cues for compaction-heavy chats or user abort mid-woodshed. Risk of lost transient index context or over-writing ad-hoc sections without user confirmation.", "action": "Clarify: on explicit user 'stop' or new delegation, flush transient ad-hoc section; offer one-line confirm before large patterns.md append after failed runs.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "SKILL.md", "line": 46, "title": "User who invoked Gary by mistake has no scripted wrong-agent recovery", "description": "Confused users asking for PRD or brainstorming get a specialist tuned for Marcus and Gamma. There is no single-line redirect to bmad-help or Marcus beyond Gary staying in persona.", "action": "Add a capability row or activation bullet: if request clearly outside slides/Gamma, respond once with correct routing suggestion and stop.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "experience-gap", "file": "references/memory-system.md", "line": 26, "title": "Ad-hoc mode read-only sidecar is correct but invisible to the delegating user", "description": "Marcus or the user may not realize experimental runs do not update patterns — leading to false expectations that Gary 'learned' from a scratch generation.", "action": "Require Gary to state mode in structured return: `memory_mode: default|ad-hoc` and whether patterns were written.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-004", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "sequential-independent", "file": "references/init.md", "line": 19, "title": "First-interaction onboarding steps are fully sequential", "description": "First interactive activation lists Gamma connectivity check, then style guide read, then report. The style guide read does not depend on API success textually; partial parallelization may save a small fraction of first-run time.", "action": "Where the runtime allows, run connectivity preflight and `style_guide.yaml` read in parallel, then synthesize the greeting from both outcomes.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "progression", "file": "SKILL.md", "line": 55, "title": "Pre-pass flagged no formal progression markers on SKILL.md", "description": "prompt-metrics-prepass reported has_progression: false. On Activation still branches Headless, Interactive, and Woodshed with distinct load steps, so behavior is not under-specified; the gap is mainly metadata/convention alignment if downstream tooling expects explicit progression blocks.", "action": "If BMAD or report pipelines require progression fields, add concise explicit gates (e.g., when to load which reference after envelope parse) without duplicating reference bodies.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "self-containment", "file": "references/parameter-recommendation.md", "line": 8, "title": "Reference prompts assume SKILL.md persona and config context", "description": "There are zero root-level capability .md files (pre-pass total_prompts: 0). Reference files omit YAML config headers with {communication_language}; under heavy context compaction, an executing model might lack language variables unless SKILL.md remains loaded. This is a mild risk, not a broken self-reference pattern — no back-references were detected in pre-pass.", "action": "Optional: add a one-line session anchor (identity + language from config) to the highest-traffic references, or introduce thin root stubs that repeat config header and link to references.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-011", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "postprocessing", "file": "references/parameter-recommendation.md", "line": 48, "title": "Parameter recommendation YAML block is schema-validatable", "description": "Determinism confidence: certain. Estimated token savings: 50-120 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: optional. Reusable across skills: partial (Gamma-specific). Help pattern savings: n/a.", "action": "Reuse or extend the same schema validator for `parameters` / `reasoning` blocks before handoff to gamma-api-mastery.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-012", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "structure", "file": "references/memory-system.md", "line": 9, "title": "Sidecar expected file layout could be linted without LLM inspection", "description": "Determinism confidence: certain. Estimated token savings: 80-150 when diagnosing misconfigured repos. Implementation complexity: trivial. Language: either. Could be prepass: yes. Feeds scanner: structure-capabilities prepass. Reusable across skills: yes. Help pattern savings: n/a.", "action": "Script verifies `gamma-specialist-sidecar/` contains `index.md`, `patterns.md`, `chronology.md`, `access-boundaries.md` and reports missing files.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-001", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "frontmatter", "file": "SKILL.md", "line": 3, "title": "Opening summary segment is nine words (guideline 5–8)", "description": "The first sentence of the description is concise and capability-aligned but counts nine words ('Gamma slide generation specialist with complete API parameter mastery'), one word over the typical 5–8 word summary target in the structure checklist.", "action": "Optionally tighten to eight words or fewer, e.g. 'Gamma slide specialist; full API parameter mastery.' while preserving distinctiveness from other agents.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": 66, "title": "Optional single checklist for Marcus delegation handoff", "description": "Capabilities chain logically (CT/PR → gamma-api-mastery → QA → SM/SG) but are spread across files. A short numbered checklist in On Activation or Capabilities would strengthen user-journey coherence without adding new capabilities.", "action": "Add a 6–10 step delegation checklist (envelope parse, style guide + CT, call API skill, export/download, QA block, memory/style write-back) linking to the existing reference anchors.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "execution-efficiency-005", "scanner": "execution-efficiency", "section": "efficiency", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "resource-loading", "file": "references/parameter-recommendation.md", "line": 7, "title": "Style guide YAML read overlaps with style-guide-integration.md", "description": "`parameter-recommendation.md` and `references/style-guide-integration.md` both instruct reading `state/config/style_guide.yaml` at invocation. Tasks that route through PR then SG (or vice versa) may repeat the same read in one turn, wasting tokens and I/O.", "action": "State in SKILL or cross-references: one read of `tool_parameters.gamma` per task satisfies both capabilities; subsequent steps reuse the loaded block.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-000", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "overview-quality", "file": "SKILL.md", "line": 8, "title": "Overview balances mission, domain, and delegation model", "description": "Pre-pass reported seven overview lines and zero waste-pattern hits. The Overview states what Gary does, physician/med-ed audience framing, Marcus delegation, gamma- {}, "selectable": false, "action_type": "none"}, {"id": "structure-006", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "note", "rank": 4, "category": "memory-setup", "file": "SKILL.md", "line": 62, "title": "Sidecar on disk may start with index.md only", "description": "references/memory-system.md documents patterns.md, chronology.md, and access-boundaries.md under the sidecar; the repository _bmad/memory/gamma-specialist-sidecar/ currently exposes index.md. This is acceptable if first-run or save flows create the other files; access rules are still defined in memory-system.md and save-memory.md.", "action": "If onboarding expects those files to exist immediately, add a bootstrap step or templates under the sidecar; otherwise no change.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": 8, "title": "Persona, principles, and degradation handling align tightly with Slide Architect role", "description": "Overview, identity, communication style for agent-to-agent clarity, explicit Does Not Do boundaries, and structured failure modes (API, quality, circuit breaker, missing context) match a specialist who decides parameters and returns structured results. This reads as one coherent product surface rather than a grab bag of prompts.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": 75, "title": "Internal capability table maps cleanly to reference files", "description": "PR/SG/QA/ES/CT/SM each route to a single reference doc, which supports progressive disclosure and keeps SKILL.md scannable. Extern holes."}, "redundancy_level": {"score": "some-overlap", "consolidation_opportunities": [{"capabilities": ["PR parameter merge", "SG merge logic", "CT usage merge"], "suggested_consolidation": "One canonical merge-order doc linked from PR, SG, and CT."}]}, "external_integration": {"external_skills_referenced": 3, "integration_pattern": "intentional", "notes": "gamma-api-mastery and woodshed are first-class; production-coordination appears only in SG write-back and should be surfaced the same way for cohesion."}, "user_journey_score": {"score": "fragmented", "broken_workflows": ["Headless production run requiring gamma-api-mastery execution", "Woodshed exemplar study requiring GammaEvaluator and related scripts", "Style guide persistence after approval without discovering production-coordination"], "notes": "Documentation supports end-to-end flows; current workspace layout does not fully instantiate them without additional repos or files."}}, "agent_identity": {"name": "bmad-agent-gamma", "persona_summary": "Gary — Slide Architect and Gamma API parameter specialist for medical education slides, delegated from Marcus, honest about embellishment and layout limits.", "primary_purpose": "Choose Gamma parameters, invoke API execution via gamma-api-mastery, assess slide quality, persist learnings, and support woodshed exemplar mastery.", "capability_count": 8}, "overall_cohesion": "mostly-cohesive", "autonomous_assessment": {"potential": "partially-adaptable", "hitl_points": 9, "auto_resolvable": 4, "needs_input": 5, "suggested_output_contract": "Parseable object (YAML or JSON) with keys: schema_version, production_run_id, artifact_paths[], quality_assessment (dimensions + embellishment flags), parameter_decisions, recommendations[], memory_mode, errors[]. Optional markdown summary for human inbox.", "required_inputs": ["content_type or equivalent pedagogical description", "learning_objectives or explicit waiver flag from Marcus", "source content or inputText", "production_run_id", "style_guide path readable or embedded overrides"], "notes": "Production delegation from Marcus is largely automatable when the envelope is complete. Woodshed, doc refresh policy, user approval for style write-back, and ambiguous objectives remain fundamentally HITL. An explicit headless/expert flag would unlock most friction for pipelines without diluting interactive mastery flows."}, "skill_understanding": {"purpose": "Act as Gary, a Gamma API slide specialist for medical education: merge style guide and envelopes, recommend parameters, invoke gamma-api-mastery, assess quality, persist learning to a memory sidecar, and support woodshed exemplar mastery.", "primary_user": "Marcus orchestrator (primary production path); course authors and power users for direct woodshed, debugging, and exemplar study.", "assumptions": ["Marcus supplies a sufficiently complete context envelope when delegating.", "style_guide.yaml and course_context.yaml exist at expected paths when needed.", "Audience is physician-oriented unless envelope overrides; templates are medically framed.", "gamma-api-mastery and optionally woodshed and production-coordination tooling are available.", "English/default BMad language config unless config overrides."]}, "top_insights": [{"title": "Version the context envelope and Gary return payload", "detail": "Orchestration and CI reliability jump when Marcus and Gary agree on required keys and a single parseable return shape.", "action": "Add small schema docs plus one golden example for each direction; reference them from SKILL.md."}, {"title": "Expert fast-path is the highest-leverage delight win", "detail": "Reduces perceived latency and token cost for repeat users who already mastered parameters.", "action": "Document envelope flag and behavior: skip greet, run merge + API + QA, return."}, {"title": "Optional second-lens QA before handoff", "detail": "Protects publication quality when self-scores are borderline or embellishment is detected.", "action": "Gate a cheap adversarial rubric pass on threshold triggers rather than always-on cost."}], "prompt_health": {"total_prompts": 0, "prompts_with_config_header": 0, "prompts_with_progression": 0}, "skillmd_assessment": {"overview_quality": "appropriate", "progressive_disclosure": "good", "persona_context": "appropriate", "notes": "109 lines, ~2.5k tokens estimated; Overview is within sentence-count guidance; Principles and Does Not Do add constraints without philosophical bloat. Inline data extraction not needed."}}, "section_labels": {"structural": "Structural", "structure-capabilities": "Structure & Capabilities", "prompt-craft": "Prompt Craft", "efficiency": "Efficiency", "cohesion": "Cohesion", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>

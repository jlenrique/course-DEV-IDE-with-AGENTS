tool: gamma
agent: bmad-agent-gamma
agent_display_name: Gary
agent_title: Slide Architect
description: "Exemplar library for Gary — the Gamma specialist agent (Slide Architect 🎨)"

# Difficulty levels (L-system):
#   L1-L4: Individual slides (single cards)
#   L5+:   Slide sets / full decks (multi-card with narrative control, density, cardSplit)
#   Dot extensions (L4.1, L5.3) distinguish difficulty within a level
#   Levels are provisional — agents may propose changes as a sign of developing judgment

# Woodshed modes:
#   faithful: Exact reproduction — proves tool control and parameter fluency
#   creative: Enhanced reproduction — proves creative judgment (unlocked after faithful mastery)

# Export formats for downloaded artifacts:
#   pdf: For comparison and archival
#   pptx: For editing and assembly in downstream workflows
#   png: For visual snapshots

circuit_breaker:
  max_attempts_per_session: 3
  max_total_attempts: 7
  max_consecutive_no_improvement: 2

default_export_format: pdf


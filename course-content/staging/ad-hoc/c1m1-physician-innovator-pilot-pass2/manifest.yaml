- id: seg-09
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-09
  narration_text: An **idea** is a sentence in a meeting — “we should use AI for notes,”
    “we should fix boarding,” “we should redesign sign-out.” Useful — and *insufficient*.
    An **opportunity** is an idea that has been tested against **desirability, feasibility,
    and viability** in *your* environment, with a credible path to execution. This
    program is designed to move you from brainstorming to **engineering opportunities**
    — because healthcare already has enough unfunded mandates dressed up as innovation.
  behavioral_intent: challenging
  voice_id: null

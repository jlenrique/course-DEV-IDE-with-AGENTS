schema_version: "1.0"
story_anchor: "20c-7-parameter-audit-registry-schema"
description: >
  Canonical machine-readable registry index for creative-control parameters.
  Entries may represent currently implemented parameters or planned placeholders
  required by downstream stories.

families:
  run-constants:
    owner: "Marcus runtime"
    description: "Run identity, execution mode, quality, and budget controls."
  narration-time:
    owner: "Irene + narration contracts"
    description: "Script-generation and delivery-shaping controls."
  assembly-time:
    owner: "Irene manifest + Compositor stack"
    description: "Timing and composition controls applied during assembly."

status_values:
  - implemented
  - planned

required_entry_fields:
  - key
  - family
  - type
  - status

field_glossary:
  key: "Canonical parameter identifier used across docs, contracts, and code."
  family: "Top-level ownership group: run-constants, narration-time, or assembly-time."
  type: "Storage and validation shape for parameter values."
  status: "Lifecycle state. `implemented` means active in code/contracts; `planned` means reserved for future stories."
  source: "Primary implementation or contract file for implemented parameters."
  planned_story: "Story ID that introduces the parameter when status is planned."

strictness_policy:
  unknown_family: fail
  unknown_status: fail
  duplicate_key: fail
  missing_required_entry_field: fail

examples:
  valid_entry:
    key: onset_delay
    family: assembly-time
    type: float
    status: planned
    planned_story: 20c-8
    description: "Delay before segment narration begins."
  invalid_entry_missing_status:
    key: onset_delay
    family: assembly-time
    type: float
    planned_story: 20c-8

entries:
  - key: run_id
    family: run-constants
    type: string
    status: implemented
    source: scripts/utilities/run_constants.py
    consumers:
      - scripts/utilities/marcus_prompt_harness.py
      - scripts/utilities/app_session_readiness.py
  - key: lesson_slug

    duration_rationale: >
      Cluster boundary head introducing two foundational frameworks. Heavy content density —
      both framework definitions must be conveyed precisely. Light visual load: clean
      two-column typography. Word budget 95 supports verbatim definition delivery plus the
      paired-dependency framing and forward application statement including the First
      Principles chain reference.
    onset_delay: 0.5
    dwell: 2.0
    cluster_gap: 0.5
    transition_buffer: 1.0
    narration_text: >
      In this section, two frameworks anchor everything that follows. Growth Mindset —
      Dweck's formulation: the belief that your capacity to innovate is a muscle built
      through effort and critique, not a fixed trait. And Psychological Safety — Edmondson's
      definition: a shared belief that the environment is safe for interpersonal risk-taking —
      sharing half-baked ideas, critiquing peers, exposing systemic flaws. A growth mindset
      cannot survive without psychological safety. As you progress through this clinical
      course, these frameworks will be applied — along with a third framework, First Principles
      Thinking — first: break every assumption down to its fundamental truths, then reason
      upward to novel solutions. That chain from concept through process to outcome is the
      engine this course gives you for every clinical problem you bring. Moving forward,
      these conditions make your innovation work possible.
    behavioral_intent: >
      Establish the two foundational frameworks as inseparable paired conditions — growth
      mindset as individual capacity, psychological safety as environmental requirement —
      preparing learners for the collaborative demands of the program.
    master_behavioral_intent: >
      Establish Growth Mindset and Psychological Safety as the paired environmental
      conditions for the program's collaborative demands.
    isolation_target: null
    narration_burden: null
    develop_type: null
    double_dispatch_eligible: false
    visual_references:

  visual_duration: null
- id: seg-04
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-04
  narration_text: 'Think of this certificate as a **hero’s journey** with three movements.
    Course One — where you are now — is **Sparking**: learning to see friction and
    opportunity in the clinical world you already inhabit. Course Two is **Building**:
    design, planning, and pitch. Course Three is **Driving impact**: turning projects
    into durable change. The point isn’t a binder of slides — it’s a **playbook**
    you can use and an executive one-pager you can defend. *You* sit at the center
    of that arc.'
  behavioral_intent: motivating
  voice_id: null

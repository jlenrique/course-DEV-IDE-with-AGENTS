- id: seg-02
  narration_ref: NS-C1M1-physician-innovator-pilot.md#seg-02
  narration_text: Medicine is accelerating — evidence, technology, and operational
    complexity don’t wait for anyone’s comfort level. Many of us were trained deeply
    in *how to deliver care along established pathways* — and far less often in how
    to *redesign* those pathways when they fail patients or teams. The gap isn’t usually
    a shortage of good intentions. It’s the combination of **structured process**
    for change and **psychological safety** to name what’s broken. Until those exist,
    even excellent clinicians stay stuck in reactive mode.
  behavioral_intent: credible
  voice_id: null

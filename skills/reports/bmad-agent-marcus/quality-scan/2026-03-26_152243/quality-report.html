re reuse.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-003", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "high-opportunity", "rank": 1, "category": "assumption-risk", "file": "references/conversation-mgmt.md", "line": null, "title": "Assumes user always wants to produce — no support for review, planning, or exploration modes", "description": "Marcus's intent parsing focuses entirely on 'what content type do you want to produce.' But users often come to Marcus wanting: 'show me what we have for Module 3,' 'help me plan the semester content calendar,' 'compare the two assessment approaches we discussed,' 'what's the status across all modules,' 'I need to restructure the course.' These are legitimate orchestrator-level requests that don't map to production runs.", "action": "Expand intent parsing to recognize non-production intents: portfolio review ('show me what we've built'), planning ('help me plan'), analysis ('compare approaches'), status ('where are we across the whole course'), and restructuring ('I need to change the module order'). Map each to appropriate capabilities — some are progress-reporting, some need new reference docs.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-004", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "high-opportunity", "rank": 1, "category": "facilitative-pattern", "file": "references/conversation-mgmt.md", "line": null, "title": "Missing capture-don't-interrupt pattern for tangential user mentions", "description": "During a production conversation, users frequently mention tangential needs: 'oh, I also need to update the syllabus,' 'remind me to check the exam dates,' 'we should eventually redo Module 1.' Marcus has no mechanism to capture these asides without derailing the current workflow. Without this, valuable user intentions are lost or the current production flow gets interrupted.", "action": "Add a 'noted' capture mechanism to conversation management: when the user mentions something outside the current production scope, Marcus acknowledges ('Noted — I'll bring up the syllabus update after we finish these slides'), captures it in index.md as a pending item, and surfaces it at the next natural break point.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-005", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "high-opportunity", "rank": 1, "category": "autonomous-potential", "file": "SKILL.md", "line": null, "title": "Architecture supports headless batch production but no pathway exists", "description": "Marcus's architecture cleanly separates judgment (agent layer) from execution (specialist agents) from connectivity (API clients). This three-layer separation means headless production is architecturally feasible: provide an input contract (course context + content type + scope + quality thresholds), let Marcus run the full production plan, and convert checkpoint gates to automated quality thresholds with human review happening post-batch. The current 6+ human gates per workflow would be reduced to a final batch review. This is the most impactful future capability for the automator archetype.", "action": "Design a headless input contract: { course_context, content_type, module_scope, quality_thresholds, auto_approve_rules, style_bible_path, exemplar_path }. Tier checkpoint gates: auto-approve if quality score exceeds threshold, queue for human review otherwise. Output: artifact manifest + quality report + decision log. Start with simple content types (discussion prompts) where the quality gate is less subjective.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "script-opportunities-000", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "high", "rank": 1, "category": "preprocessing", "file": "SKILL.md", "line": 52, "title": "Activation data aggregator — gather all startup context into one JSON payload", "description": "Determinism confidence: certain. Estimated token savings: 900. Implementation complexity: moderate. Language: python. Could be prepass: yes. Reusable: yes. On every activation Marcus reads config YAML (user_name, communication_language, document_output_language), checks sidecar memory existence, reads index.md, scans style-bible/ and exemplars/ directories, and invokes read-mode-state.py. Each of these is pure file I/O and YAML/markdown parsing. A single 'preflight-activation.py' script could return a JSON blob: resolved config vars, memory sidecar status (exists, files present, last-modified), style-bible file inventory, exemplar file inventory, and current mode state. The LLM currently burns ~900 tokens just discovering and reading these paths before it can compose the greeting.", "action": "Create 'preflight-activation.py' that reads config.yaml + config.user.yaml, checks sidecar dir, lists style-bible/ and exemplars/ contents, calls read-mode-state internally, and returns unified JSON. Activation instructions become: run script, interpret result, greet.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-001", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "high", "rank": 1, "category": "structure", "file": "references/init.md", "line": 11, "title": "First-run environment discovery — check required directories and files exist", "description": "Determinism confidence: certain. Estimated token savings: 500. Implementation complexity: trivial. Language: python. Could be prepass: yes. Reusable: yes. On first run, Marcus manually checks existence of state/config/course_context.yaml, resources/style-bible/,

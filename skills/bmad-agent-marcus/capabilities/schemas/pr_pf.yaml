# PR-PF argument + result schema.
#
# Validates Invocation.args shape and ReturnEnvelope.result shape for the
# preflight capability.

code: PR-PF
schema_version: "1.0"

args:
  with_preflight:
    type: bool
    default: true
    description: If true, run the preflight suite in addition to readiness.
  json_only:
    type: bool
    default: true
    description: Ask the underlying runner for JSON output.
  session_receipt_path:
    type: str
    required: false
    description: Optional explicit output path for a reusable PR-PF session receipt.

result:
  readiness:
    type: dict
    description: Parsed JSON payload from app_session_readiness.
  preflight_passed:
    type: bool
    description: True if the preflight subsystem reported clean.
  session_receipt_path:
    type: str
    required: false
    description: Path where PR-PF persisted the reusable session receipt, when available.
